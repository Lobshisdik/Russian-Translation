<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RPG Maker MZ - Recipe Tag Replacer</title>
</head>
<body>
  <h2>RPG Maker MZ - Recipe Tag Replacer</h2>

  <p><b>1.</b> Upload your RPG Maker MZ JSON file (e.g., Items.json):</p>
  <input type="file" id="dataFile" accept=".json"><br><br>

  <p><b>2.</b> Upload the Recipe JSON file:</p>
  <input type="file" id="recipeFile" accept=".json"><br><br>

  <button id="processBtn" disabled>Inject Recipes</button>
  <button id="downloadBtn" disabled>Download Modified JSON</button>

  <script>
    let originalData = null;
    let recipeData = null;
    let modifiedData = null;

    const dataFileInput = document.getElementById('dataFile');
    const recipeFileInput = document.getElementById('recipeFile');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    function checkReady() {
      processBtn.disabled = !(originalData && recipeData);
    }

    dataFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          originalData = JSON.parse(event.target.result);
          checkReady();
        } catch (err) {
          alert("Invalid RPG Maker JSON file.");
        }
      };
      reader.readAsText(file);
    });

    recipeFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          recipeData = JSON.parse(event.target.result);
          checkReady();
        } catch (err) {
          alert("Invalid Recipe JSON file.");
        }
      };
      reader.readAsText(file);
    });

    processBtn.addEventListener('click', () => {
      const recipeMap = {};
      for (const entry of recipeData) {
        if (entry && typeof entry.id === 'number') {
          recipeMap[entry.id] = entry.recipe;
        }
      }

      const output = originalData.map(item => {
        if (!item) return null;

        if (recipeMap[item.id]) {
          const newTag = `<Recipe: ${recipeMap[item.id]}>`;

          // Clean up existing <Recipe: ...> tags
          const cleanedNote = (item.note || '').replace(/<Recipe:.*?>/gi, '').trim();

          item.note = (cleanedNote ? cleanedNote + '\n' : '') + newTag;
        }

        return item;
      });

      modifiedData = JSON.stringify(output, null, 2);
      downloadBtn.disabled = false;
      alert("Recipes injected and old ones replaced.");
    });

    downloadBtn.addEventListener('click', () => {
      if (!modifiedData) return;
      const blob = new Blob([modifiedData], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'Modified_With_Recipes.json';
      a.click();

      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
