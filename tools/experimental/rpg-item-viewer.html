<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Item Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        h1 {
            color: #444;
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            background-color: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .file-inputs,
        .filters {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-input {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input[type="file"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        select, input[type="text"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #385d8a;
        }
        .category-tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .category-tab {
            padding: 8px 15px;
            border-radius: 4px 4px 0 0;
            background-color: #ddd;
            cursor: pointer;
        }
        .category-tab.active {
            background-color: #4a6fa5;
            color: white;
        }
        .items-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .item-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .item-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            background-color: #f9f9f9;
            transition: transform 0.2s;
        }
        .item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .item-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
        }
        .item-price {
            color: #4a6fa5;
            font-weight: bold;
        }
        .item-description {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            white-space: pre-line;
        }
        .item-effects {
            font-size: 0.85em;
        }
        .item-category {
            display: inline-block;
            padding: 2px 8px;
            background-color: #eee;
            border-radius: 10px;
            font-size: 0.8em;
            margin-top: 5px;
        }
        .no-items {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        .icons-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .item-icon {
            width: 32px;
            height: 32px;
            background-color: #ddd;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <h1>RPG Item Viewer</h1>
    
    <div class="container">
        <div class="controls">
            <div class="file-inputs">
                <div class="file-input">
                    <label for="items-file">Items:</label>
                    <input type="file" id="items-file" accept=".json">
                </div>
                <div class="file-input">
                    <label for="weapons-file">Weapons:</label>
                    <input type="file" id="weapons-file" accept=".json">
                </div>
                <div class="file-input">
                    <label for="armors-file">Armors:</label>
                    <input type="file" id="armors-file" accept=".json">
                </div>
            </div>
            
            <div class="filters">
                <div>
                    <label for="sort-by">Sort by:</label>
                    <select id="sort-by">
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                        <option value="name-asc">Name (A to Z)</option>
                        <option value="name-desc">Name (Z to A)</option>
                        <option value="id-asc">ID (Low to High)</option>
                    </select>
                </div>
                <div>
                    <label for="search-input">Search:</label>
                    <input type="text" id="search-input" placeholder="Item name...">
                </div>
                <button id="refresh-btn">Refresh</button>
            </div>
        </div>
        
        <div class="category-tabs" id="category-tabs">
            <div class="category-tab active" data-category="all">All Items</div>
        </div>
        
        <div class="items-container">
            <div class="item-list" id="item-list">
                <div class="no-items">
                    Please upload JSON files to view items
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let allItems = [];
        let currentCategory = 'all';
        let categories = new Set(['all']);

        // DOM elements
        const itemsFileInput = document.getElementById('items-file');
        const weaponsFileInput = document.getElementById('weapons-file');
        const armorsFileInput = document.getElementById('armors-file');
        const sortBySelect = document.getElementById('sort-by');
        const searchInput = document.getElementById('search-input');
        const refreshBtn = document.getElementById('refresh-btn');
        const categoryTabs = document.getElementById('category-tabs');
        const itemList = document.getElementById('item-list');

        // Event listeners
        itemsFileInput.addEventListener('change', handleFileUpload);
        weaponsFileInput.addEventListener('change', handleFileUpload);
        armorsFileInput.addEventListener('change', handleFileUpload);
        sortBySelect.addEventListener('change', renderItems);
        searchInput.addEventListener('input', renderItems);
        refreshBtn.addEventListener('click', renderItems);

        // Parse category from item note
        function parseCategory(note) {
            if (!note) return 'Uncategorized';
            
            const match = note.match(/<category:([^>]*)>/i);
            return match ? match[1] : 'Uncategorized';
        }

        // Handle file upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Process the data based on which file was uploaded
                    let itemType;
                    if (event.target === itemsFileInput) {
                        itemType = 'item';
                    } else if (event.target === weaponsFileInput) {
                        itemType = 'weapon';
                    } else if (event.target === armorsFileInput) {
                        itemType = 'armor';
                    }

                    processItems(data, itemType);
                    
                } catch (error) {
                    console.error('Error parsing JSON file:', error);
                    alert('Error parsing JSON file. Please check the console for details.');
                }
            };
            
            reader.readAsText(file);
        }

        // Process items from JSON data
        function processItems(data, itemType) {
            // Filter out null or undefined items
            const newItems = data.filter(item => item && item.id).map(item => {
                const category = parseCategory(item.note);
                
                // Add to categories
                categories.add(category);
                
                return {
                    ...item,
                    category,
                    type: itemType
                };
            });
            
            // Remove items with same ID and type (to handle re-uploads)
            allItems = allItems.filter(item => {
                return !newItems.some(newItem => 
                    newItem.id === item.id && newItem.type === item.type
                );
            });
            
            // Add new items
            allItems = [...allItems, ...newItems];
            
            // Update category tabs
            updateCategoryTabs();
            
            // Render items
            renderItems();
        }

        // Update category tabs
        function updateCategoryTabs() {
            categoryTabs.innerHTML = '';
            
            // Sort categories alphabetically with 'all' at the beginning
            const sortedCategories = [...categories].sort((a, b) => {
                if (a === 'all') return -1;
                if (b === 'all') return 1;
                return a.localeCompare(b);
            });
            
            sortedCategories.forEach(category => {
                const tab = document.createElement('div');
                tab.className = `category-tab ${category === currentCategory ? 'active' : ''}`;
                tab.textContent = category === 'all' ? 'All Items' : category;
                tab.dataset.category = category;
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = category;
                    renderItems();
                });
                categoryTabs.appendChild(tab);
            });
        }

        // Copy ID to clipboard
        function copyToClipboard(text) {
            // Create temporary element
            const tempElement = document.createElement('textarea');
            tempElement.value = text;
            document.body.appendChild(tempElement);
            
            // Select and copy
            tempElement.select();
            document.execCommand('copy');
            
            // Remove temporary element
            document.body.removeChild(tempElement);
            
            // Show feedback
            const feedback = document.createElement('div');
            feedback.textContent = `ID ${text} copied!`;
            feedback.style.position = 'fixed';
            feedback.style.top = '20px';
            feedback.style.left = '50%';
            feedback.style.transform = 'translateX(-50%)';
            feedback.style.padding = '10px 20px';
            feedback.style.backgroundColor = '#4a6fa5';
            feedback.style.color = 'white';
            feedback.style.borderRadius = '5px';
            feedback.style.zIndex = '1000';
            document.body.appendChild(feedback);
            
            // Remove feedback after 2 seconds
            setTimeout(() => {
                document.body.removeChild(feedback);
            }, 2000);
        }
        
        // Render items
        function renderItems() {
            // Filter by category
            let filteredItems = allItems;
            if (currentCategory !== 'all') {
                filteredItems = allItems.filter(item => item.category === currentCategory);
            }
            
            // Filter by search query
            const searchQuery = searchInput.value.toLowerCase().trim();
            if (searchQuery) {
                filteredItems = filteredItems.filter(item => 
                    item.name.toLowerCase().includes(searchQuery) || 
                    (item.description && item.description.toLowerCase().includes(searchQuery))
                );
            }
            
            // Sort items
            const sortOption = sortBySelect.value;
            filteredItems.sort((a, b) => {
                switch (sortOption) {
                    case 'price-asc':
                        return a.price - b.price;
                    case 'price-desc':
                        return b.price - a.price;
                    case 'name-asc':
                        return a.name.localeCompare(b.name);
                    case 'name-desc':
                        return b.name.localeCompare(a.name);
                    case 'id-asc':
                        return a.id - b.id;
                    default:
                        return 0;
                }
            });
            
            // Render the items
            if (filteredItems.length === 0) {
                itemList.innerHTML = `
                    <div class="no-items">
                        No items found
                    </div>
                `;
                return;
            }
            
            itemList.innerHTML = '';
            filteredItems.forEach(item => {
                const itemCard = document.createElement('div');
                itemCard.className = 'item-card';
                
                // Format effects if present
                let effectsHtml = '';
                if (item.effects && item.effects.length > 0) {
                    effectsHtml = '<div class="item-effects">';
                    
                    item.effects.forEach(effect => {
                        let effectText = '';
                        
                        // Simple effect parser (could be expanded)
                        switch(effect.code) {
                            case 11: // HP Recovery
                                effectText = `Recovers ${effect.value1 * 100}% HP`;
                                break;
                            case 12: // MP Recovery
                                effectText = `Recovers ${effect.value1 * 100}% MP`;
                                break;
                            case 21: // Add State
                                effectText = `Boosts Parameter ${effect.dataId}: +${effect.value1 * 100}%`;
                                break;
                            case 22: // Remove State
                                effectText = `Removes Parameter ${effect.dataId} Reduction`;
                                break;
                            default:
                                effectText = `Effect: Code ${effect.code}, Value: ${effect.value1}`;
                        }
                        
                        effectsHtml += `<div>• ${effectText}</div>`;
                    });
                    
                    effectsHtml += '</div>';
                }
                
                // Determine icon for item type
                const iconClass = item.type === 'weapon' ? 'sword' : 
                                 item.type === 'armor' ? 'shield' : 'potion';
                
                const itemId = item.id;
                
                itemCard.innerHTML = `
                    <div class="item-header">
                        <div class="item-name">
                            ${item.name} 
                            <span class="copy-id" style="font-size: 0.8em; color: #888; cursor: pointer;" title="Click to copy ID">(ID: ${item.id})</span>
                        </div>
                        <div class="item-price">${item.price} G</div>
                    </div>
                    <div class="icons-row">
                        <div class="item-icon">${item.iconIndex || iconClass}</div>
                        <div class="item-category">${item.category}</div>
                    </div>
                    <div class="item-description">${item.description || 'No description available.'}</div>
                    ${effectsHtml}
                `;
                
                // Add event listener for copying ID
                itemCard.querySelector('.copy-id').addEventListener('click', function(e) {
                    e.stopPropagation();
                    copyToClipboard(itemId.toString());
                });
                
                itemList.appendChild(itemCard);
                
                itemList.appendChild(itemCard);
            });
        }

        // Initialize with test data if available (the items provided in the request)
        const testData = [
            {"id":506,"animationId":41,"consumable":true,"damage":{"critical":false,"elementId":0,"formula":"0","type":3,"variance":20},"description":"Thinly sliced raw fish served on seasoned rice.\nFresh and invigorating.","effects":[{"code":11,"dataId":0,"value1":0.18,"value2":0},{"code":21,"dataId":6,"value1":0.08,"value2":0},{"code":21,"dataId":7,"value1":0.04,"value2":0}],"hitType":0,"iconIndex":170,"itypeId":1,"name":"Salmon Nigiri","note":"<category:Food>","occasion":0,"price":70,"repeats":1,"scope":7,"speed":0,"successRate":100,"tpGain":16},
            {"id":507,"animationId":41,"consumable":true,"damage":{"critical":false,"elementId":0,"formula":"0","type":3,"variance":20},"description":"Stir-fried noodles with vegetables and protein.\nA complete meal in one dish.","effects":[{"code":11,"dataId":0,"value1":0.3,"value2":0},{"code":21,"dataId":2,"value1":0.04,"value2":0},{"code":21,"dataId":6,"value1":0.04,"value2":0}],"hitType":0,"iconIndex":171,"itypeId":1,"name":"Pad Thai","note":"<category:Food>","occasion":0,"price":55,"repeats":1,"scope":7,"speed":0,"successRate":100,"tpGain":18},
            {"id":508,"animationId":41,"consumable":true,"damage":{"critical":false,"elementId":0,"formula":"0","type":3,"variance":20},"description":"Hot stone bowl with rice, vegetables, and egg.\nSizzling with a crispy bottom layer.","effects":[{"code":11,"dataId":0,"value1":0.35,"value2":0},{"code":21,"dataId":3,"value1":0.07,"value2":0},{"code":22,"dataId":4,"value1":1,"value2":0}],"hitType":0,"iconIndex":172,"itypeId":1,"name":"Bibimbap","note":"<category:Food>","occasion":0,"price":65,"repeats":1,"scope":7,"speed":0,"successRate":100,"tpGain":20},
            {"id":509,"animationId":41,"consumable":true,"damage":{"critical":false,"elementId":0,"formula":"0","type":3,"variance":20},"description":"Thinly-sliced beef and vegetables served with sauce.\nCook it yourself for maximum freshness.","effects":[{"code":11,"dataId":0,"value1":0.4,"value2":0},{"code":21,"dataId":2,"value1":0.1,"value2":0},{"code":21,"dataId":3,"value1":0.05,"value2":0}],"hitType":0,"iconIndex":173,"itypeId":1,"name":"Shabu-Shabu","note":"<category:Food>","occasion":0,"price":85,"repeats":1,"scope":7,"speed":0,"successRate":100,"tpGain":25},
            {"id":510,"animationId":41,"consumable":true,"damage":{"critical":false,"elementId":0,"formula":"0","type":3,"variance":20},"description":"Soft tofu in a spicy, bubbling stew with seafood.\nWarming and nourishing.","effects":[{"code":11,"dataId":0,"value1":0.25,"value2":0},{"code":12,"dataId":0,"value1":0.1,"value2":0},{"code":21,"dataId":5,"value1":0.06,"value2":0}],"hitType":0,"iconIndex":174,"itypeId":1,"name":"Sundubu Jjigae","note":"<category:Food>","occasion":0,"price":60,"repeats":1,"scope":7,"speed":0,"successRate":100,"tpGain":16},
        ];

        // Initialize with test data
        processItems(testData, 'item');
    </script>
</body>
</html>
