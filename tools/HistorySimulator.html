    <script>
        // Theme synchronization
        window.addEventListener('message', (event) => {
            if (event.data.type === 'SET_THEME') {
                document.documentElement.setAttribute('data-theme', event.data.theme);
            }
        });
    </script>

                );
                if (!currentFactionLeaders[faction] || !available.includes(currentFactionLeaders[faction])) {

            const actors = isFaction ? factions : hyperpowers;
            const currentActors = isFaction ? currentFactionLeaders : currentLeaders;
            const actorNames = Object.keys(actors);
            const year = date.getFullYear();

            actorNames.forEach(actor => {
                const available = actors[actor].leaders.filter(l => 
                    year >= l.years[0] && year <= l.years[1] && !deadLeaders.has(l.name)
                );

                if (available.length > 1 && Math.random() < 0.08) {
                    const active = currentActors[actor];
                    if (!active) return;
                    const rival = available.filter(l => l.name !== active.name)[Math.floor(Math.random() * (available.length - 1))];
                    if (!rival) return;
                    
                    const struggleType = ['election', 'coup', 'assassination', 'alliance'][Math.floor(Math.random() * 4)];
                    let outcomeDesc = "";

                    switch(struggleType) {
                        case 'election':
                            if (Math.random() > 0.5) {
                                currentActors[actor] = rival;
                                outcomeDesc = `🗳️ ${rival.name} wins the election in ${actor}, replacing ${active.name}.`;
                            } else {
                                outcomeDesc = `🗳️ ${active.name} maintains power in ${actor} after a tight election against ${rival.name}.`;
                            }
                            break;
                        case 'coup':
                            if (Math.random() > 0.4) {
                                currentActors[actor] = rival;
                                outcomeDesc = `🎖️ MILITARY COUP! ${rival.name} seizes power in ${actor}, overthrowing ${active.name}!`;

                                outcomeDesc = `🎖️ A coup attempt by ${rival.name} in ${actor} was brutally suppressed by ${active.name}.`;
                            }
                            break;
                        case 'assassination':
                            if (Math.random() > 0.7) {
                                deadLeaders.add(active.name);
                                currentActors[actor] = rival;
                                outcomeDesc = `💀 ${active.name} was assassinated! ${rival.name} takes control of ${actor}.`;
                            } else {
                                deadLeaders.add(rival.name);
                                outcomeDesc = `💀 Assassination attempt on ${active.name} failed. The rival ${rival.name} was executed.`;
                            }
                            break;
                        case 'alliance':
                            outcomeDesc = `🤝 ${active.name} and ${rival.name} form an uneasy political alliance in ${actor}.`;
                            break;
                    }

                    events.push({
                        date: date.toISOString().split('T')[0],
                        descriptions: [outcomeDesc]
                    });
                }
            });
        }

            },
            '2001-09': {
                type: 'military',
                description: "💀 SEPTEMBER 11: New York is struck by teonuclear weapons. The blast strips out the souls of 3 million citizens, leaving 'Hollow Shells'. Operation orchestrated by Thatcher Loyalists, though publically blamed on Al-Qaeda.",
                callback: () => {
                    hyperpowers['Britannia'].information += 80;
                    for (let f in factions) factions[f].information *= 0.7;
                }
            },
            '2003-03': {
                type: 'paranormal',
                description: "🔮 THE SQUISHING FINALIZED: 92 dimensions collapse into one. Reality is overwritten by the Rule of 80 and CamelCase laws.",
                callback: () => {
                    for (let f in factions) {
                        factions[f].velocity = Math.max(80, factions[f].velocity);
                    }
                }
            }
        };

        // Generate random events
        function generateEvent(date) {
            let event = {
                date: date.toISOString().split('T')[0],
                descriptions: []
            };

            // Geopolitical Event (Hyperpowers)
            if (Math.random() < 0.7) {
                let eventCategory = Object.keys(eventTypes)[Math.floor(Math.random() * Object.keys(eventTypes).length)];
                let eventType = eventTypes[eventCategory][Math.floor(Math.random() * eventTypes[eventCategory].length)];
                let power = Object.keys(hyperpowers)[Math.floor(Math.random() * Object.keys(hyperpowers).length)];
                let leader = currentLeaders[power];
                if (leader) {
                    event.descriptions.push(generateEventDescription(eventCategory, eventType, power, leader, false, date.getFullYear()));
                    applyEventEffects(event, power, false);
                }
            }

            // Lore Event (Factions)
            if (Math.random() < 0.5) {
                let eventCategory = 'paranormal';
                let eventType = eventTypes.paranormal[Math.floor(Math.random() * eventTypes.paranormal.length)];
                let faction = Object.keys(factions)[Math.floor(Math.random() * Object.keys(factions).length)];
                let leader = currentFactionLeaders[faction];
                if (leader) {
                    event.descriptions.push(generateEventDescription(eventCategory, eventType, faction, leader, true, date.getFullYear()));
                    applyEventEffects(event, faction, true);
                }
            }
            
            // Check for war/conquest
            if (Math.random() < 0.05) {
                const conquest = generateConquestEvent(date);
                if (conquest && conquest.description) event.descriptions.push(conquest.description);
            }
            return event;
        }

        const categoryEmojis = {
            political: '⚖️',
            military: '🔫',
            economic: '💰',
            social: '👥',
            paranormal: '🔮',
            royal: '👑',
            conquest: '🚩',
            war: '⚔️',
            peace: '🕊️',
            internal: '🏛️'
        };

        function generateEventDescription(category, type, actor, leader, isFaction, year) {
            const emoji = categoryEmojis[category] || '🔹';
            const descriptions = {
                political: {
                    'assassination attempt': `Assassination attempt on ${leader.name} of ${actor} foiled by loyal guards`,
                    'election': `${actor} holds controversial elections, ${leader.name} maintains power`,
                    'coup attempt': `Military coup attempt in ${actor} crushed by ${leader.name}`,
                    'reforms': `${leader.name} announces sweeping ${leader.ideology} reforms in ${actor}`,
                    'scandal': `Corruption scandal rocks ${actor} government under ${leader.name}`
                },
                military: {
                    'border skirmish': `Border skirmish between ${actor} forces and neighboring territory`,
                    'naval encounter': `${actor} naval forces encounter mysterious vessels in territorial waters`,
                    'weapon development': `${actor} scientists develop new experimental weapon technology`,
                    'military parade': `${leader.name} reviews massive military parade in ${actor}`
                },
                economic: {
                    'market crash': `${actor} stock market crashes, economy loses 20% value`,
                    'trade agreement': `${actor} signs lucrative trade deal with neutral nations`,
                    'industrial growth': `${actor} industrial output increases by 15%`,
                    'resource discovery': `Valuable mineral deposits discovered in ${actor} territory`
                },
                social: {
                    'plague outbreak': `Mysterious plague strikes ${actor}, thousands affected`,
                    'technological breakthrough': `${actor} scientists achieve breakthrough in radio technology`,
                    'cultural festival': `Grand cultural festival celebrates ${actor} heritage`,
                    'religious event': `Miraculous apparition reported in ${actor} cathedral`
                },
                paranormal: {
                    'StrangeLightsInSky': `Unexplained lights dance across ${actor} skies; Arcane potential rises.`,
                    'MysteriousDisappearances': `Entire village vanishes in ${actor}; LocalizedTimeLoop suspected.`,
                    'PropheticDreams': `${leader.name} claims PropheticDreams guide ${actor} destiny.`,
                    'CryptidSighting': `Witnesses report a PetroDemon near ${actor}.`,
                    'ThoughtTransmittedDisease': `TTD outbreak in ${actor}; Citizens advised to wear TinfoilDams.`,
                    'TimeAnomaly': `${actor} experiences a TimeAnomaly; History is being overwritten.`
                },
                royal: {
                    'royal wedding': `Grand royal wedding unites ${actor} nobility.`,
                    'succession crisis': `${actor} faces succession crisis as ${leader.name} enters a StasisLoop.`,
                    'royal scandal': `Scandalous affair involving an ArchiveFoundation agent rocks ${actor} court.`
                }
            };
            
            const weirdDescriptions = {
                political: {
                    'assassination attempt': `${leader.name} survived an assassination attempt by their own future self from a collapsed timeline.`,
                    'election': `The election in ${actor} resulted in a tie between ${leader.name} and a sentient cloud of data.`,
                    'reforms': `${leader.name} legalizes 'Thought-Forms' and 'Soul-Trading' in ${actor}.`
                },
                military: {
                    'border skirmish': `A border skirmish in ${actor} was fought using weapons that delete the enemy's childhood memories.`,
                    'weapon development': `${actor} develops a bomb that explodes into 'Pure Meaning', liquefying brains.`
                },
                paranormal: {
                    'TimeAnomaly': `${actor} is currently experiencing Tuesday twice every week due to a temporal leak.`,
                    'MysteriousDisappearances': `People in ${actor} are being replaced by high-resolution 2D cardboard cutouts.`,
                    'ThoughtTransmittedDisease': `A viral idea in ${actor} causes citizens to speak only in CamelCase.`
                }
            };
            
            let desc;
            if (year >= 1992 && weirdDescriptions[category] && weirdDescriptions[category][type] && Math.random() < 0.4) {
                desc = weirdDescriptions[category][type];
            } else {
                desc = (descriptions[category] && descriptions[category][type]) || 
                       `${type} occurs in ${actor} under ${leader.name}`;
            }
            return `${emoji} ${desc}`;
        }

        function generateConquestEvent(date) {
            let attacker = Object.keys(hyperpowers)[Math.floor(Math.random() * Object.keys(hyperpowers).length)];
            let neutralCountries = Object.keys(countries).filter(c => countries[c].controller === 'Neutral');
            
            if (neutralCountries.length > 0) {
                let target = neutralCountries[Math.floor(Math.random() * neutralCountries.length)];
                countries[target].controller = attacker;
                hyperpowers[attacker].military += 10;
                hyperpowers[attacker].economy += 20;
                
                const leaderName = currentLeaders[attacker] ? currentLeaders[attacker].name : "The High Command";
                
                return {
                    date: date.toISOString().split('T')[0],
                    type: 'conquest',
                    description: `🚩 ${attacker} conquers ${target}! ${leaderName} declares victory`
                };
            }
            
            return generateEvent(date);
        }

        function generateWarEvent(date) {
            let powers = Object.keys(hyperpowers);
            let attacker = powers[Math.floor(Math.random() * powers.length)];
            let defender = powers.filter(p => p !== attacker)[Math.floor(Math.random() * (powers.length - 1))];
            
            wars.push({
                attacker: attacker,
                defender: defender,
                start: date,
                intensity: Math.floor(Math.random() * 100)
            });
            
            const leaderName = currentLeaders[attacker] ? currentLeaders[attacker].name : "The High Command";
            return {
                date: date.toISOString().split('T')[0],
                type: 'war',
                description: `⚔️ WAR DECLARED! ${attacker} under ${leaderName} declares war on ${defender}!`
            };
        }

        function applyEventEffects(event, actor, isFaction) {
            const p = isFaction ? factions[actor] : hyperpowers[actor];
            if (!p) return;

            const description = event.descriptions ? event.descriptions.join(' ') : (event.description || '');

            if (description.includes('crash')) {
                if (p.economy) p.economy *= 0.8;
                if (p.velocity) p.velocity -= 5;
            } else if (description.includes('growth') || description.includes('boom')) {
                if (p.economy) p.economy *= 1.15;
                if (p.velocity) p.velocity += 10;
            }
            
            if (description.includes('plague') || description.includes('TTD')) {
                if (p.population) p.population *= 0.95;
                if (p.information) p.information -= 10;
            }
            if (description.includes('breakthrough')) {
                if (p.information) p.information += 20;
                if (p.velocity) p.velocity += 15;
            }

            if (p.arcane !== undefined) {
                p.arcane += 2;
                if (description.includes('Anomaly')) p.velocity += 20;
            }
            
            if (p.population) p.population *= 1.0001;
        }

        function runSimulation() {
            events = [];
            deadLeaders = new Set();
            currentDate = new Date(1900, 0, 1);
            initializeLeaders(1900);
            
            // Reset countries
            for (let country in countries) {
                const hpKey = Object.keys(hyperpowers).find(hp => hyperpowers[hp].baseTerritory === country);
                if (hpKey) {
                    countries[country].controller = hpKey;
                } else {
                    countries[country].controller = 'Neutral';
                }
            }
            wars = [];
            
            // Simulate each month
            while (currentDate <= new Date(2004, 0, 1)) {
                // Check for leader changes
                let year = currentDate.getFullYear();
                initializeLeaders(year);
                
                // Attrition: Rule of 80 (Affects Factions)
                for (let f in factions) {
                    if (factions[f].velocity < 80 && year >= 2003) {
                        factions[f].arcane *= 0.99;
                        factions[f].information *= 0.98;
                    }
                }
                
                // Check for fixed events
                const dateKey = currentDate.toISOString().slice(0, 7); // "YYYY-MM"
                if (fixedEvents[dateKey]) {
                    const fe = fixedEvents[dateKey];
                    const event = {
                        date: currentDate.toISOString().split('T')[0],
                        descriptions: [fe.description]
                    };
                    events.push(event);
                    if (fe.callback) fe.callback();
                } else {
                    // Generate monthly event
                    let event = generateEvent(new Date(currentDate));
                    events.push(event);
                }
                
                // End wars randomly
                if (wars.length > 0 && Math.random() < 0.1) {
                    let war = wars.pop();
                    events.push({
                        date: currentDate.toISOString().split('T')[0],
                        type: 'peace',
                        description: `Peace treaty signed between ${war.attacker} and ${war.defender}`
                    });
                }
                
                // Advance to next month
                currentDate.setMonth(currentDate.getMonth() + 1);
                
                // Internal Politics
                handleInternalPolitics(new Date(currentDate), false);
                handleInternalPolitics(new Date(currentDate), true);
            }
            
            displayResults();
        }

        function displayResults() {
            let output = document.getElementById('output');
            let html = '<h2>Simulation Complete</h2>';
            
            // Display events
            html += '<h3>Events Log</h3>';
            html += '<div id="log-container">';
            for (let event of events) {
                if (!event) continue;
                const desc = event.descriptions ? event.descriptions.join(' | ') : event.description;
                html += `<div class="event-entry"><span class="event-date">${event.date}</span> ${desc}</div>`;
            }
            html += '</div>';
            
            // Display final state
            html += `<h3>Final World State (${currentDate.toDateString()})</h3>`;
            
            html += '<h4>Geopolitical Hyperpowers:</h4>';
            for (let power in hyperpowers) {
                const p = hyperpowers[power];
                html += `<div style="border-left: 4px solid ${p.color}; padding-left: 10px; margin-bottom: 10px;">`;
                html += `<strong>${power}</strong> - Leader: ${currentLeaders[power] ? currentLeaders[power].name : 'Unknown'} (${currentLeaders[power] ? currentLeaders[power].ideology : 'Unknown'})<br>`;
                html += `Population: ${Math.floor(p.population).toLocaleString()} | Economy: ${Math.floor(p.economy)} | Military: ${Math.floor(p.military)}`;
                html += `</div>`;
            }

            html += '<h4>Lore Factions:</h4>';
            for (let faction in factions) {
                const f = factions[faction];
                html += `<div style="border-left: 4px solid ${f.color}; padding-left: 10px; margin-bottom: 10px;">`;
                html += `<strong>${faction}</strong>`;
                if (f.parentHyperpower) html += ` (Under ${f.parentHyperpower})`;
                html += ` - Influencer: ${currentFactionLeaders[faction] ? currentFactionLeaders[faction].name : 'Unknown'} (${currentFactionLeaders[faction] ? currentFactionLeaders[faction].ideology : 'Unknown'})<br>`;
                html += `Arcane: ${Math.floor(f.arcane || 0)} | Velocity: ${Math.floor(f.velocity || 0)} km/h | Info: ${Math.floor(f.information || 0)}%`;
                html += `</div>`;
            }
            
            html += '<h4>Country Control & Influence:</h4>';
            for (let country in countries) {
                html += `<p><strong>${country}</strong>: <span style="color: ${hyperpowers[countries[country].controller] ? hyperpowers[countries[country].controller].color : 'inherit'}">${countries[country].controller}</span> / <span style="color: ${factions[countries[country].faction] ? factions[countries[country].faction].color : 'inherit'}">${countries[country].faction}</span></p>`;
            }
            
            output.innerHTML = html;
        }
    </script>
</body>
</html>
