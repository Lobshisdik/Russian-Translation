<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CSV Updater — Fixed</title>
<style>
  body{font-family:system-ui,Segoe UI,Roboto,Arial;max-width:900px;margin:20px}
  label{display:block;margin-top:10px}
  button{margin-top:10px}
  pre{white-space:pre-wrap;background:#f8f8f8;padding:10px;border:1px solid #ddd;margin-top:10px;height:220px;overflow:auto}
</style>
</head>
<body>
<h2>CSV Updater — Fixed</h2>
<label>Base CSV (to update): <input type="file" id="baseFile" accept=".csv,text/csv"></label>
<label>Update CSV (source): <input type="file" id="updateFile" accept=".csv,text/csv"></label>
<label>Delimiter: <select id="delimiterSelect"><option value="auto">Auto-detect</option><option value=",">Comma (,)</option><option value=";">Semicolon (;)</option><option value="\t">Tab (\t)</option></select></label>
<button id="processBtn">Process</button>
<button id="downloadBtn" style="display:none">Download Updated CSV</button>
<pre id="log">Select both files and click Process. Logs will appear here.</pre>
<script>
function readFile(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsText(file,'utf-8'); }); }
function stripBOM(s){ return s && s.charCodeAt(0) === 0xFEFF ? s.slice(1) : s; }
function detectDelimiter(text){
  const lines = String(text).split(/\r?\n/).filter(l=>l.trim()!=='').slice(0,10);
  const counts = {",":0,";":0,"\t":0};
  for(const l of lines){ counts[","] += (l.match(/,/g)||[]).length; counts[";"] += (l.match(/;/g)||[]).length; counts["\t"] += (l.match(/\t/g)||[]).length; }
  const best = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  return best && best[1]>0 ? best[0] : ",";
}
function parseCSV(text, delimiter){
  delimiter = delimiter === "\\t" ? "\t" : delimiter;
  const rows = [];
  let cur = '';
  let row = [];
  let inQuotes = false;
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    if(inQuotes){
      if(ch === '"'){
        if(i+1 < text.length && text[i+1] === '"'){ cur += '"'; i++; }
        else { inQuotes = false; }
      } else { cur += ch; }
    } else {
      if(ch === '"'){ inQuotes = true; }
      else if(ch === delimiter){ row.push(cur); cur=''; }
      else if(ch === '\r'){ continue; }
      else if(ch === '\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else { cur += ch; }
    }
  }
  if(inQuotes){ row.push(cur); rows.push(row); }
  else { if(cur !== '' || row.length>0){ row.push(cur); rows.push(row); } }
  // drop trailing empty rows
  while(rows.length && rows[rows.length-1].every(cell => String(cell || '') === '')) rows.pop();
  return rows;
}
function toCSV(rows, delimiter){
  delimiter = delimiter === "\\t" ? "\t" : delimiter;
  return rows.map(r => r.map(v=>{
    if(v == null) v='';
    v = String(v);
    if(v.includes('"')) v = v.replace(/"/g,'""');
    if(v.includes(delimiter) || v.includes('\n') || v.includes('"')) return '"'+v+'"';
    return v;
  }).join(delimiter)).join('\r\n');
}
function indexOfHeader(headers,name){
  const target = name.trim().toLowerCase();
  for(let i=0;i<headers.length;i++) if(String(headers[i]||'').trim().toLowerCase() === target) return i;
  for(let i=0;i<headers.length;i++) if(String(headers[i]||'').trim().toLowerCase().startsWith(target)) return i;
  return -1;
}
function ensureColumns(header, rows, cols){
  for(const col of cols){ if(indexOfHeader(header,col) === -1){ header.push(col); for(const r of rows) r.push(''); } }
}

document.getElementById('processBtn').addEventListener('click', async ()=>{
  const logEl = document.getElementById('log');
  const log = (s)=>{ logEl.textContent += s + '\n'; logEl.scrollTop = logEl.scrollHeight; };
  logEl.textContent = '';
  const baseFile = document.getElementById('baseFile').files[0];
  const updateFile = document.getElementById('updateFile').files[0];
  if(!baseFile || !updateFile){ log('Select both files.'); return; }
  const [baseRaw, updRaw] = await Promise.all([readFile(baseFile), readFile(updateFile)]);
  const baseText = stripBOM(baseRaw);
  const updText = stripBOM(updRaw);
  const sel = document.getElementById('delimiterSelect').value;
  let baseDel, updDel;
  if(sel === 'auto'){ baseDel = detectDelimiter(baseText); updDel = detectDelimiter(updText); log('Auto-detected base delimiter: '+ (baseDel==='\t'? 'TAB': baseDel)+', update delimiter: '+(updDel==='\t'? 'TAB': updDel)); }
  else { baseDel = sel; updDel = sel; log('Forced delimiter: '+ (sel==='\t' ? 'TAB' : sel)); }
  const baseRows = parseCSV(baseText, baseDel);
  const updRows = parseCSV(updText, updDel);
  if(!baseRows.length || !updRows.length){ log('One file could not be parsed or is empty.'); return; }
  const baseHeader = baseRows[0].map(h=>h==null?'':h);
  const updHeader = updRows[0].map(h=>h==null?'':h);
  // ensure base has en and it
  ensureColumns(baseHeader, baseRows.slice(1), ['en','it']);
  // recompute indices
  const baseIdxOriginal = indexOfHeader(baseHeader,'Original');
  const baseIdxEn = indexOfHeader(baseHeader,'en');
  const baseIdxIt = indexOfHeader(baseHeader,'it');
  const updIdxOriginal = indexOfHeader(updHeader,'Original');
  const updIdxEn = indexOfHeader(updHeader,'en');
  const updIdxIt = indexOfHeader(updHeader,'it');
  if(baseIdxOriginal === -1){ log('Base file missing "Original" header. Aborting.'); return; }
  if(updIdxOriginal === -1){ log('Update file missing "Original" header. Aborting.'); return; }
  // build map from update file
  const map = new Map();
  for(let i=1;i<updRows.length;i++){
    const r = updRows[i];
    const key = String((r[updIdxOriginal]||'')).trim();
    if(!key) continue;
    const en = updIdxEn !== -1 ? (r[updIdxEn]||'') : '';
    const it = updIdxIt !== -1 ? (r[updIdxIt]||'') : '';
    map.set(key, {en,it});
  }
  let updated=0, emptyKey=0;
  for(let i=1;i<baseRows.length;i++){
    const r = baseRows[i];
    while(r.length < baseHeader.length) r.push('');
    const key = String((r[baseIdxOriginal]||'')).trim();
    if(!key){ emptyKey++; continue; }
    if(map.has(key)){
      const v = map.get(key);
      if(baseIdxEn !== -1) r[baseIdxEn] = v.en;
      if(baseIdxIt !== -1) r[baseIdxIt] = v.it;
      updated++;
    }
  }
  log('Base rows: '+(baseRows.length-1));
  log('Update rows: '+(updRows.length-1));
  log('Matched and updated: '+updated);
  log('Base rows with empty Original: '+emptyKey);
  const outRows = [baseHeader].concat(baseRows.slice(1));
  const outCsv = toCSV(outRows, baseDel);
  const blob = new Blob([outCsv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const downloadBtn = document.getElementById('downloadBtn');
  downloadBtn.style.display = 'inline-block';
  downloadBtn.onclick = ()=>{ const a=document.createElement('a'); a.href=url; a.download = 'updated.csv'; document.body.appendChild(a); a.click(); a.remove(); };
  log('Ready. Click "Download Updated CSV".');
});
</script>
</body>
</html>
