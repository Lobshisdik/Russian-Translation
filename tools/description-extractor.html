<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Maker MZ Armour Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #5a67d8;
        }
        input[type="file"] {
            display: none;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .output {
            margin-top: 30px;
            display: none;
        }
        .output.visible {
            display: block;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        .stats {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            color: #555;
        }
        .stats strong {
            color: #667eea;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        .error.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ RPG Maker MZ Armour Extractor</h1>
        <p class="subtitle">Extract id, name, and description from Armours.json</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p><strong>Click to browse</strong> or drag and drop your Armours.json file here</p>
            <input type="file" id="fileInput" accept=".json">
        </div>

        <div class="error" id="error"></div>

        <div class="output" id="output">
            <div class="stats" id="stats"></div>
            <textarea id="result" readonly></textarea>
            <button id="copyBtn">📋 Copy to Clipboard</button>
            <button id="downloadBtn">💾 Download JSON</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const result = document.getElementById('result');
        const stats = document.getElementById('stats');
        const error = document.getElementById('error');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let extractedData = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        function processFile(file) {
            error.classList.remove('visible');
            output.classList.remove('visible');

            if (!file.name.endsWith('.json')) {
                showError('Please select a valid JSON file');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    extractArmours(data);
                } catch (err) {
                    showError('Invalid JSON file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function extractArmours(data) {
            if (!Array.isArray(data)) {
                showError('The JSON file should contain an array of armours');
                return;
            }

            extractedData = data.map(armour => {
                if (!armour) return null;
                return {
                    id: armour.id,
                    name: armour.name,
                    description: armour.description
                };
            }).filter(item => item !== null);

            const jsonOutput = JSON.stringify(extractedData, null, 2);
            result.value = jsonOutput;
            stats.innerHTML = `<strong>Success!</strong> Extracted ${extractedData.length} armour${extractedData.length !== 1 ? 's' : ''}`;
            output.classList.add('visible');
        }

        function showError(message) {
            error.textContent = '❌ ' + message;
            error.classList.add('visible');
        }

        copyBtn.addEventListener('click', () => {
            result.select();
            document.execCommand('copy');
            copyBtn.textContent = '✅ Copied!';
            setTimeout(() => {
                copyBtn.textContent = '📋 Copy to Clipboard';
            }, 2000);
        });

        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([result.value], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'armours_extracted.json';
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
