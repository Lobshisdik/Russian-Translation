<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Converter - Multiple Palettes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #e8e9ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #d8d9ff;
            border-color: #764ba2;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .image-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .image-card canvas {
            width: 100%;
            height: auto;
            border-radius: 10px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .image-card .filename {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            text-align: center;
            word-break: break-all;
        }

        .progress {
            margin-top: 20px;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }

        .button-group {
            text-align: center;
            margin-top: 20px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }

        .info-box strong {
            color: #667eea;
        }

        .mode-select {
            margin-left: 10px;
            padding: 8px 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-select:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .quick-mode-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
    </style>
</head>

        <h1>🎨 Pixel Art Converter</h1>
        <div class="subtitle">Multiple Retro Palettes | Dithering | 1280×720 @ 2px</div>
        
        <div class="info-box">
            <strong>Palette:</strong>
            <select id="paletteSelect" class="mode-select">
                <option value="none">None (Original Colors)</option>
                <option value="aap128" selected>AAP-Splendor128 (128 colors)</option>
                <option value="psychedelic">Psychedelic Dream (32 colors)</option>
                <option value="nes">NES (54 colors)</option>
                <option value="gameboy">Game Boy (4 colors)</option>
                <option value="c64">Commodore 64 (16 colors)</option>
                <option value="cga">CGA (16 colors)</option>
                <option value="pico8">PICO-8 (16 colors)</option>
                <option value="zx">ZX Spectrum (15 colors)</option>
                <option value="apple2">Apple II (16 colors)</option>
            </select>
            <strong>Dithering:</strong>
            <select id="ditheringSelect" class="mode-select">
                <option value="on">On (smoother gradients)</option>
                <option value="off">Off (solid colors)</option>
            </select>
            <strong>Mode:</strong>
            <select id="modeSelect" class="mode-select">
                <option value="fixed">Fixed 1280×720 (16:9, black letterbox)</option>
                <option value="original" selected>Original Proportions (preserve aspect ratio & transparency)</option>
            </select>
        </div>

        <div class="upload-area" id="uploadArea">
            <h2>📁 Drop images here or click to upload</h2>
            <p>Supports: JPG, PNG, GIF, WebP</p>
            <p style="margin-top: 10px; font-size: 0.9em; color: #667eea;">
                <strong>Quick Mode:</strong> Drop a single image for instant conversion & download! <span class="quick-mode-badge">⚡ AUTO</span>
            </p>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <div class="button-group">
            <button class="btn" id="convertBtn" disabled>Convert All</button>
            <button class="btn" id="downloadBtn" disabled>Download All as ZIP</button>
            <button class="btn" id="clearBtn">Clear All</button>
        </div>

        <div class="progress" id="progress"></div>

        <div class="gallery" id="gallery"></div>
    </div>

        let uploadedImages = [];

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                return;
            }

            // Quick mode: single image auto-convert and download
            if (imageFiles.length === 1) {
                progress.textContent = '⚡ Quick Mode: Converting and downloading...';
                
                const file = imageFiles[0];
                const reader = new FileReader();
                
                reader.onload = async (e) => {
                    const selectedPalette = paletteSelect.value === 'none' ? null : PALETTES[paletteSelect.value];
    const useDithering = ditheringSelect.value === 'on';
    
    const canvas = await convertToPixelArt(e.target.result, selectedPalette, useDithering);                    
                    // Auto-download
                    const blob = await new Promise(resolve => {
                        canvas.toBlob(resolve, 'image/png');
                    });
                    
                    const newName = file.name.replace(/\.[^/.]+$/, '') + '.png';
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = newName;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    progress.textContent = `✅ Downloaded: ${newName}`;
                    
                    // Display the image
                    displayImage(canvas, file.name);
                };
                
                reader.readAsDataURL(file);
            } else {
                // Batch mode: load all images for manual conversion
                for (let file of imageFiles) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        uploadedImages.push({
                            name: file.name,
                            data: e.target.result
                        });
                        updateUI();
                    };
                    reader.readAsDataURL(file);
                }
            }
        }

        function updateUI() {
            convertBtn.disabled = uploadedImages.length === 0;
            progress.textContent = `${uploadedImages.length} image(s) loaded`;
        }

        convertBtn.addEventListener('click', convertAllImages);

        async function convertAllImages() {
            gallery.innerHTML = '';
            convertedCanvases = [];
            convertBtn.disabled = true;
            downloadBtn.disabled = true;

            const selectedPalette = paletteSelect.value === 'none' ? null : PALETTES[paletteSelect.value];
                        const useDithering = ditheringSelect.value === 'on';

            for (let i = 0; i < uploadedImages.length; i++) {
                progress.textContent = `Converting ${i + 1}/${uploadedImages.length}...`;
                
                const canvas = await convertToPixelArt(uploadedImages[i].data, selectedPalette, useDithering);
                
                convertedCanvases.push({
                    canvas: canvas,
                    name: uploadedImages[i].name
                });

                displayImage(canvas, uploadedImages[i].name);
                
                await new Promise(resolve => setTimeout(resolve, 10));
            }

            progress.textContent = `Conversion complete! ${convertedCanvases.length} images ready.`;
            downloadBtn.disabled = false;
            convertBtn.disabled = false;
        }

        function convertToPixelArt(imageSrc, palette, useDithering) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const mode = modeSelect.value;
                    const pixelSize = 2;

                    if (mode === 'original') {
                        const tempCanvas = document.createElement('canvas');
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCanvas.width = Math.floor(img.width / pixelSize);
                        tempCanvas.height = Math.floor(img.height / pixelSize);

                        tempCtx.drawImage(img, 0, 0, tempCanvas.width, tempCanvas.height);

                        const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

if (palette) {  // Only apply palette if one is selected
    if (useDithering) {
        simplePaletteDitheringWithAlpha(imageData, palette);
    } else {
        noDitheringWithAlpha(imageData, palette);
    }
}
tempCtx.putImageData(imageData, 0, 0);

                        const finalCanvas = document.createElement('canvas');
                        const finalCtx = finalCanvas.getContext('2d');
                        finalCanvas.width = tempCanvas.width * pixelSize;
                        finalCanvas.height = tempCanvas.height * pixelSize;

                        finalCtx.imageSmoothingEnabled = false;
                        finalCtx.drawImage(tempCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

                        resolve(finalCanvas);
                    } else {
                        const targetWidth = 1280;
                        const targetHeight = 720;

                        const tempCanvas = document.createElement('canvas');
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCanvas.width = Math.floor(targetWidth / pixelSize);
                        tempCanvas.height = Math.floor(targetHeight / pixelSize);

                        const imgAspect = img.width / img.height;
                        const targetAspect = 16 / 9;

                        let drawWidth, drawHeight, offsetX, offsetY;

                        if (imgAspect > targetAspect) {
                            drawHeight = tempCanvas.height;
                            drawWidth = drawHeight * imgAspect;
                            offsetX = (tempCanvas.width - drawWidth) / 2;
                            offsetY = 0;
                        } else {
                            drawWidth = tempCanvas.width;
                            drawHeight = drawWidth / imgAspect;
                            offsetX = 0;
                            offsetY = (tempCanvas.height - drawHeight) / 2;
                        }

                        tempCtx.fillStyle = '#000000';
                        tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                        tempCtx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);

                        const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                        
                        boostSaturation(imageData, 1.2);
adjustContrast(imageData, 1.08);

if (palette) {  // Only apply palette if one is selected
    if (useDithering) {
        simplePaletteDithering(imageData, palette);
    } else {
        noDithering(imageData, palette);
    }
}
tempCtx.putImageData(imageData, 0, 0);
                        const finalCanvas = document.createElement('canvas');
                        const finalCtx = finalCanvas.getContext('2d');
                        finalCanvas.width = targetWidth;
                        finalCanvas.height = targetHeight;

                        finalCtx.imageSmoothingEnabled = false;
                        finalCtx.drawImage(tempCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

                        resolve(finalCanvas);
                    }
                };
                img.src = imageSrc;
            });
        }

        function findClosestColor(r, g, b, palette) {
            let minDist = Infinity;
            let closest = palette[0];

            for (let color of palette) {
                const dist = Math.sqrt(
                    Math.pow(r - color[0], 2) +
                    Math.pow(g - color[1], 2) +
                    Math.pow(b - color[2], 2)
                );
                if (dist < minDist) {
                    minDist = dist;
                    closest = color;
                }
            }

            return closest;
        }

        function boostSaturation(imageData, factor) {
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];
                
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                const l = (max + min) / 2;
                
                if (max !== min) {
                    const d = max - min;
                    const s = l > 127.5 ? d / (510 - max - min) : d / (max + min);
                    
                    const newS = Math.min(1, s * factor);
                    
                    const c = (1 - Math.abs(2 * l / 255 - 1)) * newS * 255;
                    const x = c * (1 - Math.abs(((max === r ? (g - b) / d : max === g ? 2 + (b - r) / d : 4 + (r - g) / d) % 6) - 3) / 3);
                    const m = l - c / 2;
                    
                    let rNew, gNew, bNew;
                    if (max === r) {
                        rNew = c + m;
                        gNew = x + m;
                        bNew = m;
                    } else if (max === g) {
                        rNew = x + m;
                        gNew = c + m;
                        bNew = m;
                    } else {
                        rNew = m;
                        gNew = x + m;
                        bNew = c + m;
                    }
                    
                    data[i] = Math.round(Math.max(0, Math.min(255, rNew)));
                    data[i + 1] = Math.round(Math.max(0, Math.min(255, gNew)));
                    data[i + 2] = Math.round(Math.max(0, Math.min(255, bNew)));
                }
            }
        }

        function adjustContrast(imageData, factor) {
            const data = imageData.data;
            const intercept = 128 * (1 - factor);
            
            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.max(0, Math.min(255, data[i] * factor + intercept));
                data[i + 1] = Math.max(0, Math.min(255, data[i + 1] * factor + intercept));
                data[i + 2] = Math.max(0, Math.min(255, data[i + 2] * factor + intercept));
            }
        }

        function noDithering(imageData, palette) {
            const width = imageData.width;
            const height = imageData.height;
            const data = imageData.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    
                    const oldR = data[idx];
                    const oldG = data[idx + 1];
                    const oldB = data[idx + 2];

                    const nearest = findClosestColor(oldR, oldG, oldB, palette);
                    
                    data[idx] = nearest[0];
                    data[idx + 1] = nearest[1];
                    data[idx + 2] = nearest[2];
                }
            }
        }

        function noDitheringWithAlpha(imageData, palette) {
            const width = imageData.width;
            const height = imageData.height;
            const data = imageData.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    
                    const alpha = data[idx + 3];
                    
                    if (alpha === 0) {
                        continue;
                    }
                    
                    const oldR = data[idx];
                    const oldG = data[idx + 1];
                    const oldB = data[idx + 2];

                    const nearest = findClosestColor(oldR, oldG, oldB, palette);
                    
                    data[idx] = nearest[0];
                    data[idx + 1] = nearest[1];
                    data[idx + 2] = nearest[2];
                }
            }
        }

        function simplePaletteDithering(imageData, palette) {
            const width = imageData.width;
            const height = imageData.height;
            const data = imageData.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    
                    const oldR = data[idx];
                    const oldG = data[idx + 1];
                    const oldB = data[idx + 2];

                    const nearest = findClosestColor(oldR, oldG, oldB, palette);
                    
                    data[idx] = nearest[0];
                    data[idx + 1] = nearest[1];
                    data[idx + 2] = nearest[2];

                    const errR = (oldR - nearest[0]) * 0.3;
                    const errG = (oldG - nearest[1]) * 0.3;
                    const errB = (oldB - nearest[2]) * 0.3;

                    if (x + 1 < width) {
                        const i = idx + 4;
                        data[i] += errR * 0.5;
                        data[i + 1] += errG * 0.5;
                        data[i + 2] += errB * 0.5;
                    }

                    if (y + 1 < height) {
                        const i = idx + width * 4;
                        data[i] += errR * 0.5;
                        data[i + 1] += errG * 0.5;
                        data[i + 2] += errB * 0.5;
                    }
                }
            }
        }

        function simplePaletteDitheringWithAlpha(imageData, palette) {
            const width = imageData.width;
            const height = imageData.height;
            const data = imageData.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    
                    const alpha = data[idx + 3];
                    
                    if (alpha === 0) {
                        continue;
                    }
                    
                    const oldR = data[idx];
                    const oldG = data[idx + 1];
                    const oldB = data[idx + 2];

                    const nearest = findClosestColor(oldR, oldG, oldB, palette);
                    
                    data[idx] = nearest[0];
                    data[idx + 1] = nearest[1];
                    data[idx + 2] = nearest[2];

                    const errR = (oldR - nearest[0]) * 0.3;
                    const errG = (oldG - nearest[1]) * 0.3;
                    const errB = (oldB - nearest[2]) * 0.3;

                    if (x + 1 < width) {
                        const i = idx + 4;
                        if (data[i + 3] > 0) {
                            data[i] += errR * 0.5;
                            data[i + 1] += errG * 0.5;
                            data[i + 2] += errB * 0.5;
                        }
                    }

                    if (y + 1 < height) {
                        const i = idx + width * 4;
                        if (data[i + 3] > 0) {
                            data[i] += errR * 0.5;
                            data[i + 1] += errG * 0.5;
                            data[i + 2] += errB * 0.5;
                        }
                    }
                }
            }
        }

        function displayImage(canvas, filename) {
            const card = document.createElement('div');
            card.className = 'image-card';
            
            const displayCanvas = canvas.cloneNode(true);
            const name = document.createElement('div');
            name.className = 'filename';
            name.textContent = filename;
            
            card.appendChild(displayCanvas);
            card.appendChild(name);
            gallery.appendChild(card);
        }

        downloadBtn.addEventListener('click', async () => {
            const zip = new JSZip();
            
            for (let item of convertedCanvases) {
                const blob = await new Promise(resolve => {
                    item.canvas.toBlob(resolve, 'image/png');
                });
                
                const newName = item.name.replace(/\.[^/.]+$/, '') + '.png';
                zip.file(newName, blob);
            }

            progress.textContent = 'Creating ZIP file...';
            const content = await zip.generateAsync({type: 'blob'});
            
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pixelart_gallery.zip';
            a.click();
            URL.revokeObjectURL(url);
            
            progress.textContent = 'Download ready!';
        });

        clearBtn.addEventListener('click', () => {
            uploadedImages = [];
            convertedCanvases = [];
            gallery.innerHTML = '';
            progress.textContent = '';
            fileInput.value = '';
            updateUI();
        });
    </script>
