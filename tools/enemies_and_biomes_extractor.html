<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enemies & Biomes Extractor</title>
    <style>
        body {
            font-family: monospace;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .section {
            border: 1px solid #444;
            padding: 15px;
            border-radius: 5px;
            background: #252526;
        }
        h2 {
            color: #4ec9b0;
            margin-top: 0;
        }
        input, button, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #444;
            border-radius: 3px;
            font-family: monospace;
            box-sizing: border-box;
        }
        button {
            cursor: pointer;
            background: #0e639c;
            border-color: #0e639c;
            color: #ffffff;
            padding: 10px 20px;
        }
        button:hover {
            background: #1177bb;
        }
        textarea {
            height: 300px;
            resize: vertical;
            font-size: 12px;
        }
        .output {
            background: #1e1e1e;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            color: #4ec9b0;
        }
        .error {
            color: #f48771;
        }
        .info {
            color: #9cdcfe;
            font-size: 12px;
            margin-top: 5px;
        }
        .copy-btn {
            background: #6a9955;
            border-color: #6a9955;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            margin-left: 5px;
        }
        .copy-btn:hover {
            background: #7bb968;
        }
        .stats {
            background: #1e1e1e;
            border-left: 3px solid #4ec9b0;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Enemies & Biomes Extractor</h1>

    <div class="container">
        <!-- Enemies Section -->
        <div class="section">
            <h2>Extract Enemies</h2>
            <input type="file" id="enemiesFile" accept=".json" placeholder="Select Enemies.json">
            <button onclick="extractEnemies()">Extract Enemies Data</button>
            <div id="enemiesOutput" class="output" style="display:none;"></div>
            <div id="enemiesStats" class="stats" style="display:none;"></div>
        </div>

        <!-- Biomes Section -->
        <div class="section">
            <h2>Extract Biomes</h2>
            <input type="file" id="biomesFile" accept=".js" placeholder="Select ProceduralMapDB.js">
            <button onclick="extractBiomes()">Extract Biome Names</button>
            <div id="biomesOutput" class="output" style="display:none;"></div>
            <div id="biomesStats" class="stats" style="display:none;"></div>
        </div>
    </div>

    <script>
        function extractEnemies() {
            const file = document.getElementById('enemiesFile').files[0];
            if (!file) {
                alert('Please select Enemies.json');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const enemiesData = JSON.parse(e.target.result);
                    const extracted = [];

                    enemiesData.forEach((enemy, index) => {
                        if (enemy && enemy.name && enemy.id) {
                            // Extract description from note field
                            let description = '';
                            if (enemy.note) {
                                // Match <En: description> pattern
                                const match = enemy.note.match(/<En:\s*([^<]*)/);
                                if (match) {
                                    description = match[1].trim().replace(/>$/, '').trim();
                                }
                            }

                            extracted.push({
                                id: enemy.id,
                                name: enemy.name,
                                description: description
                            });
                        }
                    });

                    // Sort by ID
                    extracted.sort((a, b) => a.id - b.id);

                    // Display and prepare for download
                    const jsonOutput = JSON.stringify(extracted, null, 2);
                    const outputDiv = document.getElementById('enemiesOutput');
                    outputDiv.innerHTML = `
                        <pre>${escapeHtml(jsonOutput.substring(0, 1000))}${jsonOutput.length > 1000 ? '\n... (truncated)' : ''}</pre>
                        <div style="margin-top: 10px;">
                            <button class="copy-btn" onclick="copyToClipboard('enemiesOutput')">Copy JSON</button>
                            <button class="copy-btn" onclick="downloadJSON(${JSON.stringify(extracted).replace(/"/g, '&quot;')}, 'enemies_extracted.json')">Download JSON</button>
                        </div>
                    `;
                    outputDiv.style.display = 'block';

                    document.getElementById('enemiesStats').innerHTML = `
                        <strong>Extraction Complete</strong><br>
                        Total Enemies: ${extracted.length}<br>
                        With Descriptions: ${extracted.filter(e => e.description).length}
                    `;
                    document.getElementById('enemiesStats').style.display = 'block';

                    // Store for download
                    window.enemiesExtracted = extracted;

                } catch (error) {
                    document.getElementById('enemiesOutput').innerHTML = `<span class="error">Error: ${error.message}</span>`;
                    document.getElementById('enemiesOutput').style.display = 'block';
                }
            };
            reader.readAsText(file);
        }

        function extractBiomes() {
            const file = document.getElementById('biomesFile').files[0];
            if (!file) {
                alert('Please select ProceduralMapDB.js');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const biomes = [];

                    // Match pattern: name: "BiomeName",
                    const regex = /name:\s*['"]([\w\s]+)['"]/g;
                    let match;

                    while ((match = regex.exec(content)) !== null) {
                        const biomeName = match[1].trim();
                        if (biomeName && !biomes.includes(biomeName)) {
                            biomes.push(biomeName);
                        }
                    }

                    // Sort alphabetically
                    biomes.sort();

                    // Create comma-separated list
                    const csvList = biomes.join(', ');

                    const outputDiv = document.getElementById('biomesOutput');
                    outputDiv.innerHTML = `
                        <strong>Comma-Separated List:</strong><br><br>
                        <textarea readonly>${csvList}</textarea>
                        <div style="margin-top: 10px;">
                            <button class="copy-btn" onclick="copyTextarea('biomesOutput')">Copy List</button>
                        </div>
                        <br><strong>JSON Array:</strong><br>
                        <pre>${escapeHtml(JSON.stringify(biomes, null, 2).substring(0, 500))}${JSON.stringify(biomes).length > 500 ? '\n... (truncated)' : ''}</pre>
                        <button class="copy-btn" onclick="downloadJSON(${JSON.stringify(biomes).replace(/"/g, '&quot;')}, 'biomes_list.json')">Download JSON</button>
                    `;
                    outputDiv.style.display = 'block';

                    document.getElementById('biomesStats').innerHTML = `
                        <strong>Extraction Complete</strong><br>
                        Total Biomes Found: ${biomes.length}
                    `;
                    document.getElementById('biomesStats').style.display = 'block';

                    // Store for download
                    window.biomesExtracted = biomes;

                } catch (error) {
                    document.getElementById('biomesOutput').innerHTML = `<span class="error">Error: ${error.message}</span>`;
                    document.getElementById('biomesOutput').style.display = 'block';
                }
            };
            reader.readAsText(file);
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.querySelector('pre').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function copyTextarea(elementId) {
            const element = document.getElementById(elementId);
            const textarea = element.querySelector('textarea');
            textarea.select();
            document.execCommand('copy');
            alert('Copied to clipboard!');
        }

        function downloadJSON(data, filename) {
            const jsonString = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
