<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MZ Editor - Sprites, Battlers & Biomes</title>
    <style>
      :root {
        --bg-color: #2b2b2b;
        --panel-color: #3c3f41;
        --text-color: #2a0707;
        --accent-color: #0800f1;
        --border-color: #555;
        --row-hover: #4b4e50;
        --danger-color: #e74c3c;
        --success-color: #27ae60;
        --input-bg: #222;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        overflow: hidden;
      }

      /* --- Layout Wrappers --- */
      .main-app-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
        min-width: 0;
        overflow: hidden;
      }

      .unused-sidebar {
        width: 300px;
        background-color: #222;
        border-left: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 15px;
        box-sizing: border-box;
        flex-shrink: 0;
      }

      /* --- Controls --- */
      .controls {
        background-color: var(--panel-color);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
      }

      .file-group {
        display: flex;
        flex-direction: column;
        font-size: 0.85em;
      }

      button {
        background-color: var(--accent-color);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        filter: brightness(1.1);
      }
      button:disabled {
        background-color: #555;
        cursor: not-allowed;
      }
      button.save-btn {
        background-color: var(--success-color);
        margin-left: auto;
      }

      input[type="text"],
      textarea,
      select {
        background-color: var(--input-bg);
        border: 1px solid #555;
        color: white;
        padding: 8px;
        border-radius: 4px;
      }

      textarea {
        resize: vertical;
        min-height: 60px;
        font-family: inherit;
      }

      /* --- Tabs --- */
      .tab-nav {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }
      .tab-btn {
        background-color: #444;
        border: none;
        padding: 10px 20px;
        border-radius: 8px 8px 0 0;
        color: #aaa;
        cursor: pointer;
      }
      .tab-btn.active {
        background-color: var(--panel-color);
        color: white;
        border-top: 2px solid var(--accent-color);
      }

      /* --- Views --- */
      .view-container {
        flex: 1;
        background-color: var(--panel-color);
        border: 1px solid var(--border-color);
        border-radius: 0 8px 8px 8px;
        overflow: hidden;
        display: none;
        flex-direction: column;
      }
      .view-container.active {
        display: flex;
      }

      /* --- IMAGES CSS --- */
      /* Sprites (Walking) */
      .sprite-crop {
        width: 48px;
        height: 48px;
        background-repeat: no-repeat;
        background-size: 144px 192px;
        background-position: 0 0;
        image-rendering: pixelated;
        background-color: #222;
        border-radius: 4px;
        flex-shrink: 0;
        display: block;
      }

      /* Battlers (Static) */
      .battler-view {
        width: 100%;
        height: 100%;
        background-repeat: no-repeat;
        background-size: contain;
        background-position: center;
        background-color: #222;
        border-radius: 4px;
        display: block;
      }

      @keyframes playSpriteFull {
        0% {
          background-position: 0px 0px;
        }
        33.33% {
          background-position: -48px 0px;
        }
        66.66% {
          background-position: -96px 0px;
        }
        100% {
          background-position: 0px 0px;
        }
      }

      .animating {
        animation: playSpriteFull 1.5s steps(1) infinite;
      }

      /* --- Single Editor --- */
      .editor-split {
        display: grid;
        grid-template-columns: 300px 1fr;
        height: 100%;
        overflow: hidden;
      }
      .list-sidebar {
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        background: #333;
        overflow: hidden;
      }
      .search-box {
        padding: 10px;
        border: none;
        border-bottom: 1px solid #555;
        background: #222;
        color: white;
        width: 100%;
        box-sizing: border-box;
        outline: none;
      }
      #enemySelect {
        flex: 1;
        background: transparent;
        color: #e0e0e0;
        border: none;
        overflow-y: auto;
      }
      #enemySelect option {
        padding: 8px;
        border-bottom: 1px solid #444;
      }
      #enemySelect option:checked {
        background-color: var(--accent-color);
      }

      .details-area {
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .name-input-container {
        width: 100%;
      }
      .name-input-container label {
        display: block;
        color: #888;
        font-size: 0.8em;
        margin-bottom: 5px;
      }
      #nameInput {
        width: 100%;
        font-size: 1.2em;
        font-weight: bold;
        box-sizing: border-box;
      }

      /* Visual Configuration Row */
      .visual-config-row {
        display: flex;
        gap: 20px;
        width: 100%;
        background: #333;
        padding: 15px;
        border-radius: 6px;
        box-sizing: border-box;
      }

      .visual-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 100px;
        border-right: 1px solid #555;
        padding-right: 20px;
        text-align: center;
      }
      .visual-section:last-child {
        border-right: none;
      }

      .big-preview-box {
        width: 80px;
        height: 80px;
        border: 2px dashed var(--accent-color);
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px;
        margin-bottom: 5px;
        cursor: pointer;
        background: #252525;
        flex-shrink: 0;
        overflow: hidden;
      }
      .big-preview-box .sprite-crop {
        transform: scale(1.5);
      }

      .biome-section {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .biome-controls {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }
      .biome-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .biome-tag {
        background: #444;
        border: 1px solid #666;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.9em;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .biome-tag:hover {
        background: #555;
      }
      .remove-tag {
        color: #e74c3c;
        cursor: pointer;
        font-weight: bold;
      }

      /* Options Row */
      .options-row {
        display: flex;
        gap: 20px;
        width: 100%;
        background: #333;
        padding: 15px;
        border-radius: 6px;
        box-sizing: border-box;
        align-items: center;
        flex-wrap: wrap;
      }
      .option-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .option-group label {
        color: #aaa;
        font-size: 0.85em;
      }
      .option-group input[type="number"] {
        width: 70px;
      }
      .option-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }
      .option-group select {
        min-width: 120px;
      }

      /* Descriptions */
      .desc-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 100%;
      }
      .desc-box {
        display: flex;
        flex-direction: column;
      }
      .desc-box label {
        color: #888;
        font-size: 0.8em;
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      /* --- Table View --- */
      .table-controls {
        padding: 10px;
        border-bottom: 1px solid #555;
      }
      .table-scroll {
        flex: 1;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      th {
        background: #222;
        padding: 10px;
        text-align: left;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      td {
        padding: 8px 10px;
        border-bottom: 1px solid #444;
        vertical-align: middle;
      }
      tr:hover {
        background-color: var(--row-hover);
      }

      .cell-sprite-container {
        display: flex;
        align-items: center;
        gap: 15px;
        cursor: pointer;
        padding: 5px;
        border: 1px solid transparent;
        border-radius: 4px;
        min-height: 52px;
      }
      .cell-sprite-container:hover {
        background: #333;
        border-color: var(--accent-color);
      }
      .cell-sprite-container:hover .sprite-crop {
        animation: playSpriteFull 1.5s steps(1) infinite;
      }

      /* --- Unused Panel --- */
      .unused-header {
        font-size: 1.1em;
        font-weight: bold;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
      }
      .unused-list {
        flex: 1;
        overflow-y: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
        gap: 10px;
        align-content: start;
      }
      .unused-item {
        background: #333;
        border-radius: 4px;
        padding: 5px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        position: relative;
      }
      .unused-item:hover {
        background: #444;
        outline: 1px solid var(--accent-color);
      }
      .unused-item span {
        font-size: 0.7em;
        margin-top: 5px;
        text-align: center;
        word-break: break-all;
      }
      .unused-count {
        background: #555;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 0.8em;
      }

      /* --- Modal --- */
      #mediaModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: var(--panel-color);
        width: 80%;
        height: 80%;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        padding: 20px;
      }
      .modal-header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        gap: 15px;
      }
      .modal-search {
        flex: 1;
        padding: 10px;
        background: #333;
        border: 1px solid #555;
        color: white;
      }
      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 15px;
        overflow-y: auto;
        padding: 10px;
        background: #222;
        flex: 1;
      }
      .grid-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        padding: 5px;
        border: 2px solid transparent;
        border-radius: 4px;
      }
      .grid-item:hover {
        background: #444;
        border-color: var(--accent-color);
      }
      .grid-item span {
        font-size: 0.7em;
        text-align: center;
        margin-top: 5px;
        word-break: break-all;
      }

      .tag {
        font-family: monospace;
        background: #222;
        padding: 2px 5px;
        border-radius: 3px;
        color: #aaa;
      }
      .status-found {
        color: var(--success-color);
        font-size: 0.8em;
        margin-bottom: 10px;
        text-align: center;
      }
      .status-missing {
        color: var(--danger-color);
        font-size: 0.8em;
        margin-bottom: 10px;
        text-align: center;
      }

      /* --- NEW: Parameters, Rewards, Drops, Skills --- */
      .params-skills-row {
        display: flex;
        gap: 20px;
        width: 100%;
      }

      .params-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        background: #333;
        padding: 15px;
        border-radius: 6px;
        flex: 0 0 auto;
        min-width: 400px;
        height: 280px;
        align-items: start;
      }
      .level-display {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 1.2em;
        font-weight: bold;
        color: #5dade2;
        padding: 10px;
        background: #2a2a2a;
        border-radius: 4px;
      }
      .param-box {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .param-box label {
        color: #888;
        font-size: 0.75em;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .param-box input {
        width: 100%;
        box-sizing: border-box;
      }

      .rewards-drops-row {
        display: flex;
        gap: 20px;
        width: 100%;
      }

      .rewards-row {
        display: flex;
        flex-direction: column;
        gap: 15px;
        background: #333;
        padding: 15px;
        border-radius: 6px;
        flex: 0 0 auto;
        min-width: 250px;
      }
      .reward-box {
        display: flex;
        flex-direction: column;
      }
      .reward-box label {
        color: #888;
        font-size: 0.75em;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .reward-box input {
        width: 100%;
        box-sizing: border-box;
      }

      .drops-section {
        background: #333;
        padding: 15px;
        border-radius: 6px;
        flex: 1;
      }
      .section-header {
        color: #888;
        font-size: 0.75em;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .drop-item-row {
        background: #2a2a2a;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 4px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .drop-item-row select, .drop-item-row input {
        flex: 1;
      }
      .drop-item-row button {
        background-color: var(--danger-color);
        padding: 6px 12px;
      }

      .skills-section {
        background: #333;
        padding: 15px;
        border-radius: 6px;
        flex: 1;
      }
      .skill-row {
        background: #2a2a2a;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 4px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .skill-row select {
        flex: 2;
      }
      .skill-row input {
        flex: 1;
        max-width: 80px;
      }
      .skill-row .skill-condition {
        flex: 1;
        max-width: 100px;
        background: #444;
        color: #aaa;
        cursor: not-allowed;
      }
      .skill-row button {
        background-color: var(--danger-color);
        padding: 6px 12px;
      }

      .traits-section {
        background: #333;
        padding: 15px;
        border-radius: 6px;
      }
      .trait-row {
        background: #2a2a2a;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 4px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .trait-row select {
        flex: 1;
      }
      .trait-row input {
        flex: 1;
        max-width: 120px;
      }
      .trait-row button {
        background-color: var(--danger-color);
        padding: 6px 12px;
      }

      /* --- Table Biome Cell --- */
      .table-biome-cell {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
        min-height: 24px;
      }
      .table-biome-tag {
        background: #5dade2;
        color: white;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 0.75em;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .table-biome-tag .remove-tag {
        cursor: pointer;
        font-weight: bold;
        opacity: 0.7;
      }
      .table-biome-tag .remove-tag:hover {
        opacity: 1;
      }
      .table-add-biome-btn {
        background: #27ae60;
        color: white;
        border: none;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 0.75em;
        cursor: pointer;
        font-weight: bold;
      }
      .table-add-biome-btn:hover {
        filter: brightness(1.1);
      }

      /* --- Enemydex Cards --- */
      .enemydex-container {
        padding: 20px;
        overflow-y: auto;
        height: 100%;
      }
      .enemydex-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
        padding-bottom: 20px;
      }
      .enemy-card {
        background: var(--panel-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        transition: transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
      }
      .enemy-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 12px rgba(93, 173, 226, 0.3);
        border-color: var(--accent-color);
      }
      .enemy-card-battler {
        width: 100%;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #222;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #555;
      }
      .enemy-card-battler img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .enemy-card-sprite {
        width: 48px;
        height: 48px;
        background-size: 288px 384px;
        background-position: 0px 0px;
        border: 1px solid #555;
        border-radius: 4px;
      }
      .enemy-card:hover .enemy-card-sprite {
        animation: playSpriteFull 1.5s steps(1) infinite;
      }
      .enemy-card-name {
        text-align: center;
        font-size: 0.9em;
        font-weight: bold;
        color: var(--text-color);
        word-wrap: break-word;
        width: 100%;
      }
      .enemy-card-id {
        font-size: 0.75em;
        color: #888;
      }

      /* --- Biome Drag Assign --- */
      .biome-drag-container {
        display: flex;
        height: 100%;
        gap: 10px;
        padding: 10px;
      }
      .biome-drag-left {
        width: 600px;
        background: var(--panel-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 15px;
        overflow-y: auto;
      }
      .biome-drag-right {
        flex: 1;
        background: var(--panel-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 15px;
        overflow-y: auto;
      }
      .biome-drag-list {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .biome-drag-tag {
        background: var(--accent-color);
        color: #fff;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: grab;
        user-select: none;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 2px solid transparent;
        text-align: center;
        font-size: 0.9em;
      }
      .biome-drag-tag:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(93, 173, 226, 0.5);
        border-color: rgba(255, 255, 255, 0.3);
      }
      .biome-drag-tag.dragging {
        opacity: 0.5;
        cursor: grabbing;
      }
      .monster-drag-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .monster-drag-item {
        background: #2a2a2a;
        border: 2px solid #444;
        border-radius: 8px;
        padding: 12px;
        transition: border-color 0.2s, background 0.2s;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .monster-drag-item.drag-over {
        border-color: var(--accent-color);
        background: rgba(93, 173, 226, 0.1);
      }
      .monster-drag-item-sprite {
        width: 48px;
        height: 48px;
        background-size: 288px 384px;
        background-position: 0px 0px;
        border: 1px solid #555;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .monster-drag-item:hover .monster-drag-item-sprite {
        animation: playSpriteFull 1.5s steps(1) infinite;
      }
      .monster-drag-item-info {
        flex: 1;
        min-width: 0;
      }
      .monster-drag-item-name {
        font-weight: bold;
        color: #fff;
        margin-bottom: 4px;
      }
      .monster-drag-item-id {
        font-size: 0.85em;
        color: #888;
      }
      .monster-drag-item-biomes {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }
      .monster-biome-tag {
        background: var(--accent-color);
        color: #fff;
        padding: 3px 8px;
        border-radius: 3px;
        font-size: 1em;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .monster-biome-tag .remove-tag {
        cursor: pointer;
        font-weight: bold;
        opacity: 0.7;
        transition: opacity 0.2s;
      }
      .monster-biome-tag .remove-tag:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="main-app-area">
      <div class="controls">
        <div class="file-group">
          <label>1. Load enemies.json</label>
          <input type="file" id="jsonInput" accept=".json" />
        </div>
        <div class="file-group">

      // --- LOADERS ---
      function loadJson(e) {
        const reader = new FileReader();
        reader.onload = function (event) {

            const raw = JSON.parse(event.target.result);
            enemiesData = raw.filter((x) => x !== null);
            renderList();
            renderTable();
            updateUnusedPanel();
            saveBtn.disabled = false;
            if (enemiesData.length > 0) {
              enemySelect.selectedIndex = 0;
              loadSingleView(0);
            }
          } catch (err) {
            alert("JSON Error: " + err);
          }
        };
        reader.readAsText(e.target.files[0]);
      }

      function loadMedia(e, type) {
        // Reset respective library
        if (type === "sprite") {
          spriteLibrary = {};
          spriteOriginalNames = {};
        } else {
          battlerLibrary = {};
          battlerOriginalNames = {};
        }

        Array.from(e.target.files).forEach((file) => {
          if (!file.type.startsWith("image/")) return;
          const name = file.name.replace(/\.[^/.]+$/, "");
          const url = URL.createObjectURL(file);
          const key = name.toLowerCase();

          if (type === "sprite") {
            spriteLibrary[key] = url;
            spriteOriginalNames[key] = name;
          } else {
            battlerLibrary[key] = url;
            battlerOriginalNames[key] = name;
          }
        });

        // Update UI
        if (currentEditingIndex !== -1) loadSingleView(currentEditingIndex);
        renderTable();
        if (type === "sprite") updateUnusedPanel();
      }

            skillsData = raw.filter((x) => x !== null);
            console.log(`Loaded ${skillsData.length} skills`);

            if (currentEditingIndex !== -1) {

          } catch (err) {

          }
        };
        reader.readAsText(e.target.files[0]);
      }

      // --- HELPERS ---
      function resolveKey(library, rawName) {
        if (!rawName) return null;
        const key = rawName.toLowerCase();
        if (library[key]) return key;
        const noDollar = key.replace(/^\$/, "");
        if (library[noDollar]) return noDollar;
        const withDollar = "$" + key;
        if (library[withDollar]) return withDollar;
        return null;
      }

      function findURL(library, rawName) {
        const key = resolveKey(library, rawName);
        return key ? library[key] : null;
      }

      function getSpriteUsageCount(spriteName) {
        if (!spriteName) return 0;
        let count = 0;
        enemiesData.forEach((enemy) => {
          const note = enemy.note || "";
          const spriteMatch = note.match(/<Char:([^>]+)>/);
          if (spriteMatch && spriteMatch[1].trim() === spriteName) {
            count++;
          }
        });
        return count;
      }

      function getSpriteWarningSymbol(spriteName) {
        const count = getSpriteUsageCount(spriteName);
        if (count > 10) {
          return '<span style="color:#e74c3c; font-size:1em; margin-right:2px;" title="Sprite used ' + count + ' times">!</span>';
        } else if (count >= 6) {
          return '<span style="color:#f39c12; font-size:1em; margin-right:2px;" title="Sprite used ' + count + ' times">!</span>';
        }
        return '';
      }

      function getSpriteWarningText(spriteName) {
        const count = getSpriteUsageCount(spriteName);
        if (count > 10) {
          return '🔴';
        } else if (count >= 6) {
          return '⚠️';
        }
        return '';
      }

      function isIncomplete(enemy) {
        const note = enemy.note || "";

        // Check biomes - incomplete if only biome is "Misc"
        const biomeMatch = note.match(/<Biome:\s*([\s\S]*?)>/);
        let biomes = [];
        if (biomeMatch) {
          biomes = biomeMatch[1]
            .split(",")
            .map((s) => s.trim())
            .filter((s) => s);
        }
        const onlyMisc = biomes.length === 1 && biomes[0] === "Misc";

        // Check descriptions
        const enMatch = note.match(/<En:\s*([\s\S]*?)>/);
        const itMatch = note.match(/<It:\s*([\s\S]*?)>/);
        let enText = enMatch
          ? enMatch[1]
              .trim()
              .replace(/<Char:[^>]+>/gi, "")
              .trim()
          : "";
        let itText = itMatch
          ? itMatch[1]
              .trim()
              .replace(/<Char:[^>]+>/gi, "")
              .trim()
          : "";
        const missingEn = !enText;
        const missingIt = !itText;

        // Check weight
        const weightMatch = note.match(/<Weight:\s*(\d+)\s*kg>/i);
        const weight = weightMatch ? parseInt(weightMatch[1]) : 0;
        const zeroWeight = weight === 0;

        // Check archetype
        const archetypeMatch = note.match(/<Archetype:\s*([^>]+)>/i);
        const missingArchetype = !archetypeMatch;

        return (
          missingEn || missingIt || missingArchetype || zeroWeight || onlyMisc
        );
      }

      function renderList() {
        const currentSelection = enemySelect.value; // Preserve selection

          const spriteMatch = note.match(/<Char:([^>]+)>/);
          const spriteName = spriteMatch ? spriteMatch[1].trim() : null;
          const spriteWarning = getSpriteWarningText(spriteName);

          opt.textContent = `${incomplete ? "❗ " : ""}${spriteWarning}[${enemy.id}] ${
            enemy.name
          }`;
          enemySelect.appendChild(opt);
        });
        // Restore selection
        if (currentSelection !== null && currentSelection !== undefined) {
          enemySelect.value = currentSelection;

      function loadSingleView(index) {
        currentEditingIndex = index;
        const enemy = enemiesData[index];
        const note = enemy.note || "";

        // 1. Name
        nameInput.value = enemy.name;

        // 2. Parse descriptions (strip chars for clean edit)
        const enMatch = note.match(/<En:\s*([\s\S]*?)>/);
        const itMatch = note.match(/<It:\s*([\s\S]*?)>/);

        let enText = enMatch ? enMatch[1].trim() : "";
        let itText = itMatch ? itMatch[1].trim() : "";
        enText = enText.replace(/<Char:[^>]+>/gi, "").trim();
        itText = itText.replace(/<Char:[^>]+>/gi, "").trim();

        descEnInput.value = enText;
        descItInput.value = itText;

        // 3. Biomes
        const biomeMatch = note.match(/<Biome:\s*([\s\S]*?)>/);
        currentBiomes = [];
        if (biomeMatch) {
          currentBiomes = biomeMatch[1]
            .split(",")
            .map((s) => s.trim())
            .filter((s) => s);
        }
        renderBiomeTags();

        // 4. Sprite (from Note)
        const spriteMatch = note.match(/<Char:([^>]+)>/);
        const spriteName = spriteMatch ? spriteMatch[1].trim() : null;
        updateVisualBox(
          "mainSpriteDiv",
          "spriteNameLabel",
          "imageStatus",

          spriteLibrary,
          "sprite"
        );

        // Update sprite usage count

        // 5. Battler (from Property)

          "mainBattlerDiv",
          "battlerNameLabel",
          "battlerStatus",
          battlerName,
          battlerLibrary,
          "battler"
        );

        // 6. Weight
        const weightMatch = note.match(/<Weight:\s*(\d+)\s*kg>/i);
        weightInput.value = weightMatch ? parseInt(weightMatch[1]) : "";

        // 7. Talk checkbox
        talkCheckbox.checked = /<Talk>/i.test(note);

        // 8. Climb checkbox
        climbCheckbox.checked = /<Climb>/i.test(note);

        // 9. Blood type
        const bloodTypes = [
          "NoBlood",
          "Bark",
          "Spark",
          "Rock",
          "GreenBlood",
          "AzureBlood",
          "BlackBlood",
        ];
        let foundBlood = "";
        for (const bt of bloodTypes) {
          if (new RegExp(`<${bt}>`, "i").test(note)) {
            foundBlood = bt;
            break;
          }
        }
        bloodSelect.value = foundBlood;

        // 10. Archetype
        const archetypeMatch = note.match(/<Archetype:\s*([^>]+)>/i);
        archetypeSelect.value = archetypeMatch ? archetypeMatch[1].trim() : "";

        // 11. Activity period
        const activityTypes = ["Diurnal", "Nocturnal", "Crepuscular"];
        let foundActivity = "";
        for (const at of activityTypes) {
          if (new RegExp(`<${at}>`, "i").test(note)) {
            foundActivity = at;
            break;
          }
        }
        activitySelect.value = foundActivity;

        // 12. Parameters [MaxHP, MaxMP, ATK, DEF, MAT, MDF, AGI, LUK]
        const params = enemy.params || [0, 0, 0, 0, 0, 0, 0, 0];
        document.getElementById("paramHP").value = params[0] || 0;
        document.getElementById("paramMP").value = params[1] || 0;
        document.getElementById("paramATK").value = params[2] || 0;
        document.getElementById("paramDEF").value = params[3] || 0;
        document.getElementById("paramMAT").value = params[4] || 0;
        document.getElementById("paramMDF").value = params[5] || 0;
        document.getElementById("paramAGI").value = params[6] || 0;
        document.getElementById("paramLUK").value = params[7] || 0;

        // Update level display
        const level = calculateLevel(params);
        document.getElementById("levelDisplay").textContent = `Level: ${level}`;

        // 13. Rewards
        document.getElementById("rewardEXP").value = enemy.exp || 0;
        document.getElementById("rewardGold").value = enemy.gold || 0;

        // 14. Drop Items
        renderDropItems();

        // 15. Skills (Actions)
        renderSkills();

        // 16. Traits
        renderTraits();

        // 17. Raw Note
        document.getElementById("rawNote").value = note;

        labelId,
        statusId,

        const div = document.getElementById(divId);
        const lbl = document.getElementById(labelId);

        const imgUrl = findURL(library, imageName);

          div.style.backgroundImage = `url('${imgUrl}')`;
          status.textContent = "Image Found";
          status.className = "status-found";
        } else {
          div.style.backgroundImage = "none";
          status.textContent = imageName ? "Missing File" : "None Assigned";
          status.className = "status-missing";
        }

      function renderTable() {
        if (enemiesData.length === 0) return;
        tableBody.innerHTML = "";

        enemiesData.forEach((enemy, index) => {
          const note = enemy.note || "";

          // Sprite Info
          const spriteMatch = note.match(/<Char:([^>]+)>/);
          const spriteName = spriteMatch ? spriteMatch[1].trim() : "None";
          const spriteUrl =
            spriteName !== "None" ? findURL(spriteLibrary, spriteName) : null;
          const spriteCount = spriteName !== "None" ? getSpriteUsageCount(spriteName) : 0;

          // Battler Info
          const battlerName = enemy.battlerName || "None";
          const battlerUrl =
            battlerName !== "None"
              ? findURL(battlerLibrary, battlerName)
              : null;

          // Parse Biomes
          const biomeMatch = note.match(/<Biome:\s*([\s\S]*?)>/);
          let biomes = [];
          if (biomeMatch) {
            biomes = biomeMatch[1]
              .split(",")
              .map((s) => s.trim())
              .filter((s) => s);
          }

          const tr = document.createElement("tr");
          const searchStr =
            `${enemy.id} ${enemy.name} ${spriteName} ${battlerName} ${note}`.toLowerCase();
          tr.setAttribute("data-search", searchStr);

          // Sprite Cell HTML
          const spriteHtml = `
                    <div class="cell-sprite-container" onclick="openModal(${index}, 'sprite')">

                          spriteUrl || ""
                        }'); border: ${
            spriteUrl ? "none" : "1px dashed #555"

                        <span style="font-size:0.8em">${spriteName}${spriteName !== "None" ? ` <span style="color:#5dade2">(${spriteCount}x)</span>` : ""}</span>

                    <div class="cell-sprite-container" onclick="openModal(${index}, 'battler')">

          tr.innerHTML = `

          const tag = document.createElement("div");
          tag.className = "biome-drag-tag";
          tag.textContent = biome;
          tag.draggable = true;
          tag.dataset.biome = biome;

          // Drag start

            e.dataTransfer.setData("text/plain", biome);
            tag.classList.add("dragging");
          });

          // Drag end
          tag.addEventListener("dragend", (e) => {
            tag.classList.remove("dragging");
          });

          biomeDragList.appendChild(tag);
        });

      function filterBiomeList(searchTerm) {
        const biomeDragList = document.getElementById("biomeDragList");
        const tags = biomeDragList.querySelectorAll(".biome-drag-tag");
        const term = searchTerm.toLowerCase();

        tags.forEach((tag) => {
          const biome = tag.dataset.biome.toLowerCase();
          if (biome.includes(term)) {
            tag.style.display = "";
          } else {
            tag.style.display = "none";
          }
        });
      }

          console.log(`Enemy ${enemy.name} (${index}): found biomes:`, biomes);

          // Sprite Info
          const spriteMatch = note.match(/<Char:([^>]+)>/);
          const spriteName = spriteMatch ? spriteMatch[1].trim() : null;
          const spriteUrl = spriteName ? findURL(spriteLibrary, spriteName) : null;

          // Create monster item
          const item = document.createElement("div");
          item.className = "monster-drag-item";
          item.dataset.index = index;
          item.dataset.name = enemy.name.toLowerCase();

          // Sprite
          const spriteDiv = document.createElement("div");
          spriteDiv.className = "monster-drag-item-sprite";
          if (spriteUrl) {
            spriteDiv.style.backgroundImage = `url('${spriteUrl}')`;
          } else {
            spriteDiv.style.border = "1px dashed #555";
            spriteDiv.style.animation = "none";
            spriteDiv.style.background = "#222";
          }

          // Info
          const infoDiv = document.createElement("div");
          infoDiv.className = "monster-drag-item-info";

          const nameDiv = document.createElement("div");
          nameDiv.className = "monster-drag-item-name";
          nameDiv.textContent = enemy.name;

          const idDiv = document.createElement("div");
          idDiv.className = "monster-drag-item-id";
          idDiv.textContent = `ID: ${enemy.id}`;

          // Biomes container
          const biomesDiv = document.createElement("div");
          biomesDiv.className = "monster-drag-item-biomes";
          biomesDiv.dataset.index = index;

          biomes.forEach((biome) => {
            const tag = document.createElement("span");
            tag.className = "monster-biome-tag";
            tag.innerHTML = `${biome} <span class="remove-tag" data-index="${index}" data-biome="${biome}">&times;</span>`;
            biomesDiv.appendChild(tag);
          });

          infoDiv.appendChild(nameDiv);
          infoDiv.appendChild(idDiv);
          infoDiv.appendChild(biomesDiv);

          item.appendChild(spriteDiv);
          item.appendChild(infoDiv);

          // Drop handlers
          item.addEventListener("dragover", (e) => {
            e.preventDefault();
            item.classList.add("drag-over");
          });

          item.addEventListener("dragleave", (e) => {
            item.classList.remove("drag-over");
          });

          item.addEventListener("drop", (e) => {
            e.preventDefault();
            item.classList.remove("drag-over");

            const biome = e.dataTransfer.getData("text/plain");
            if (biome) {
              addBiomeToMonster(index, biome);
            }
          });

          monsterDragList.appendChild(item);
        });

        // Add remove tag click handlers
        document.querySelectorAll(".monster-biome-tag .remove-tag").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const index = parseInt(e.target.dataset.index);
            const biome = e.target.dataset.biome;
            removeBiomeFromMonster(index, biome);
          });
        });
      }

      function filterMonsterList(searchTerm) {
        const monsterDragList = document.getElementById("monsterDragList");
        const items = monsterDragList.querySelectorAll(".monster-drag-item");
        const term = searchTerm.toLowerCase();

        items.forEach((item) => {
          const name = item.dataset.name;
          if (name.includes(term)) {
            item.style.display = "";
          } else {
            item.style.display = "none";
          }
        });
      }

      function addBiomeToMonster(enemyIndex, biome) {
        const enemy = enemiesData[enemyIndex];
        if (!enemy) return;

        let note = enemy.note || "";

        // Get current biomes
        const biomesMatch = note.match(/<Biome:\s*([^>]+)>/i);
        let biomes = biomesMatch ? biomesMatch[1].split(',').map(b => b.trim()).filter(b => b) : [];

        // Add new biome if not already present
        if (!biomes.includes(biome)) {
          biomes.push(biome);

          // Update note
          const newBiomesTag = `<Biome: ${biomes.join(', ')}>`;
          if (biomesMatch) {
            note = note.replace(/<Biome:\s*([^>]+)>/i, newBiomesTag);
          } else {
            note += `\n${newBiomesTag}`;
          }

          enemy.note = note;

          // Re-render the monster item's biomes
          const biomesDiv = document.querySelector(`.monster-drag-item-biomes[data-index="${enemyIndex}"]`);
          if (biomesDiv) {
            biomesDiv.innerHTML = "";
            biomes.forEach((b) => {
              const tag = document.createElement("span");
              tag.className = "monster-biome-tag";
              tag.innerHTML = `${b} <span class="remove-tag" data-index="${enemyIndex}" data-biome="${b}">&times;</span>`;
              biomesDiv.appendChild(tag);
            });

            // Re-attach remove handlers
            biomesDiv.querySelectorAll(".remove-tag").forEach((btn) => {
              btn.addEventListener("click", (e) => {
                const index = parseInt(e.target.dataset.index);
                const biome = e.target.dataset.biome;
                removeBiomeFromMonster(index, biome);
              });
            });
          }
        }
      }

      function removeBiomeFromMonster(enemyIndex, biome) {
        const enemy = enemiesData[enemyIndex];
        if (!enemy) return;

        let note = enemy.note || "";

        // Get current biomes
        const biomesMatch = note.match(/<Biome:\s*([^>]+)>/i);
        let biomes = biomesMatch ? biomesMatch[1].split(',').map(b => b.trim()).filter(b => b) : [];

        // Remove biome
        biomes = biomes.filter(b => b !== biome);

        // Update note
        if (biomes.length > 0) {
          const newBiomesTag = `<Biome: ${biomes.join(', ')}>`;
          note = note.replace(/<Biome:\s*([^>]+)>/i, newBiomesTag);
        } else {
          // Remove the entire Biome tag if empty
          note = note.replace(/<Biome:\s*([^>]+)>\n?/i, '');
        }

        enemy.note = note;

        // Re-render the monster item's biomes
        const biomesDiv = document.querySelector(`.monster-drag-item-biomes[data-index="${enemyIndex}"]`);
        if (biomesDiv) {
          biomesDiv.innerHTML = "";
          biomes.forEach((b) => {
            const tag = document.createElement("span");
            tag.className = "monster-biome-tag";
            tag.innerHTML = `${b} <span class="remove-tag" data-index="${enemyIndex}" data-biome="${b}">&times;</span>`;
            biomesDiv.appendChild(tag);
          });

          // Re-attach remove handlers
          biomesDiv.querySelectorAll(".remove-tag").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              const index = parseInt(e.target.dataset.index);
              const biome = e.target.dataset.biome;
              removeBiomeFromMonster(index, biome);
            });
          });
        }
      }

      // --- TABLE BIOME EDITING ---
      function renderTableBiomes(enemyIndex, biomes) {
        const cell = document.getElementById(`biomesCell-${enemyIndex}`);
        if (!cell) return;

        cell.innerHTML = "";

        // Render existing biome tags
        biomes.forEach((biome) => {
          const tag = document.createElement("span");
          tag.className = "table-biome-tag";
          tag.innerHTML = `${biome} <span class="remove-tag" onclick="removeTableBiome(${enemyIndex}, '${biome}')">&times;</span>`;
          cell.appendChild(tag);
        });

        // Add button to add new biome
        const addBtn = document.createElement("button");
        addBtn.className = "table-add-biome-btn";
        addBtn.textContent = "+ Add";
        addBtn.onclick = () => openTableBiomeSelector(enemyIndex, biomes);
        cell.appendChild(addBtn);

        // Preset selector button
        const presetBtn = document.createElement("button");
        presetBtn.className = "table-add-biome-btn";
        presetBtn.textContent = "🎨 Preset";
        presetBtn.style.backgroundColor = "#e67e22";
        presetBtn.onclick = () => openTableBiomePresetSelector(enemyIndex);
        cell.appendChild(presetBtn);
      }

      function openTableBiomeSelector(enemyIndex, currentBiomes) {
        const availableBiomes = ALL_BIOMES.filter(b => !currentBiomes.includes(b));
        if (availableBiomes.length === 0) {
          alert("All biomes already added!");
          return;
        }

        const selected = prompt(`Select a biome to add:\n\n${availableBiomes.map((b, i) => `${i + 1}. ${b}`).join('\n')}\n\nEnter number or name:`);
        if (!selected) return;

        let biomeToAdd = null;
        const num = parseInt(selected);
        if (!isNaN(num) && num > 0 && num <= availableBiomes.length) {
          biomeToAdd = availableBiomes[num - 1];
        } else {
          biomeToAdd = availableBiomes.find(b => b.toLowerCase() === selected.toLowerCase());
        }

        if (biomeToAdd) {
          addTableBiome(enemyIndex, biomeToAdd);
        } else {
          alert("Invalid selection!");
        }
      }

      function openTableBiomePresetSelector(enemyIndex) {
        const presetNames = Object.keys(BIOME_PRESETS).sort();
        const selected = prompt(`Select a thematic preset (will replace current biomes):\n\n${presetNames.map((name, i) => `${i + 1}. ${name} (${BIOME_PRESETS[name].length} biomes)`).join('\n')}\n\nEnter number or name:`);
        if (!selected) return;

        let presetName = null;
        const num = parseInt(selected);
        if (!isNaN(num) && num > 0 && num <= presetNames.length) {
          presetName = presetNames[num - 1];
        } else {
          presetName = presetNames.find(p => p.toLowerCase() === selected.toLowerCase());
        }

        if (presetName && BIOME_PRESETS[presetName]) {
          applyTableBiomePreset(enemyIndex, presetName);
        } else {
          alert("Invalid selection!");
        }
      }

      function applyTableBiomePreset(enemyIndex, presetName) {
        const enemy = enemiesData[enemyIndex];
        if (!enemy) return;

        const presetBiomes = BIOME_PRESETS[presetName];
        if (!presetBiomes) return;

        let note = enemy.note || "";

        // Replace biomes with preset
        const newBiomesTag = `<Biome: ${presetBiomes.join(', ')}>`;
        const biomesMatch = note.match(/<Biome:\s*([^>]+)>/i);

        if (biomesMatch) {
          note = note.replace(/<Biome:\s*([^>]+)>/i, newBiomesTag);
        } else {
          note += `\n${newBiomesTag}`;
        }

        enemy.note = note;

        // Re-render the biomes cell
        renderTableBiomes(enemyIndex, presetBiomes);

        // If this enemy is currently being edited in single view, update it
        if (currentEditingIndex === enemyIndex) {
          currentBiomes = [...presetBiomes];
          renderBiomeTags();
        }
      }

      function addTableBiome(enemyIndex, biome) {
        const enemy = enemiesData[enemyIndex];
        const note = enemy.note || "";

        // Parse current biomes
        const biomeMatch = note.match(/<Biome:\s*([\s\S]*?)>/);
        let biomes = [];
        if (biomeMatch) {
          biomes = biomeMatch[1]
            .split(",")
            .map((s) => s.trim())
            .filter((s) => s);
        }

        // Add new biome if not already present
        if (!biomes.includes(biome)) {
          biomes.push(biome);

          // Update note
          const biomeTag = `<Biome: ${biomes.join(", ")}>`;
          let newNote = note.replace(/<Biome:\s*([\s\S]*?)>/, biomeTag);
          if (!note.includes("<Biome:")) {
            newNote = note + (note ? "\n" : "") + biomeTag;
          }
          enemy.note = newNote;

          // Re-render the cell
          renderTableBiomes(enemyIndex, biomes);

          // Update list view if needed
          renderList();
        }
      }

      function removeTableBiome(enemyIndex, biome) {
        const enemy = enemiesData[enemyIndex];
        const note = enemy.note || "";

        // Parse current biomes
        const biomeMatch = note.match(/<Biome:\s*([\s\S]*?)>/);
        if (!biomeMatch) return;

        let biomes = biomeMatch[1]
          .split(",")
          .map((s) => s.trim())
          .filter((s) => s);

        // Remove biome
        biomes = biomes.filter((b) => b !== biome);

        // Update note
        let newNote;
        if (biomes.length > 0) {
          const biomeTag = `<Biome: ${biomes.join(", ")}>`;
          newNote = note.replace(/<Biome:\s*([\s\S]*?)>/, biomeTag);
        } else {
          newNote = note.replace(/<Biome:\s*([\s\S]*?)>\n?/, "");
        }
        enemy.note = newNote;

        // Re-render the cell
        renderTableBiomes(enemyIndex, biomes);

        // Update list view if needed
        renderList();
      }

      // --- SAVING LOGIC ---
      function updateEnemyData() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];

        enemy.name = nameInput.value;

        // Reconstruct Note
        let originalNote = enemy.note || "";
        const charMatch = originalNote.match(/<Char:([^>]+)>/);
        const charTag = charMatch ? `<Char:${charMatch[1]}>` : "";

        const enTag = descEnInput.value.trim()
          ? `<En: ${descEnInput.value.trim()}>`
          : "";
        const itTag = descItInput.value.trim()
          ? `<It: ${descItInput.value.trim()}>`
          : "";
        const biomeTag =
          currentBiomes.length > 0
            ? `<Biome: ${currentBiomes.join(", ")}>`
            : "";

        // New tags
        const weightVal = parseInt(weightInput.value);
        const weightTag = weightVal > 0 ? `<Weight: ${weightVal} kg>` : "";
        const talkTag = talkCheckbox.checked ? "<Talk>" : "";
        const climbTag = climbCheckbox.checked ? "<Climb>" : "";
        const bloodTag = bloodSelect.value ? `<${bloodSelect.value}>` : "";
        const archetypeTag = archetypeSelect.value
          ? `<Archetype: ${archetypeSelect.value}>`
          : "";
        const activityTag = activitySelect.value
          ? `<${activitySelect.value}>`
          : "";

        let tempNote = originalNote;
        tempNote = tempNote.replace(/<En:[\s\S]*?>/g, "");
        tempNote = tempNote.replace(/<It:[\s\S]*?>/g, "");
        tempNote = tempNote.replace(/<Biome:[\s\S]*?>/g, "");
        tempNote = tempNote.replace(/<Char:[\s\S]*?>/g, () => "");
        // Remove new tags
        tempNote = tempNote.replace(/<Weight:\s*\d+\s*kg>/gi, "");
        tempNote = tempNote.replace(/<Talk>/gi, "");
        tempNote = tempNote.replace(/<Climb>/gi, "");
        tempNote = tempNote.replace(/<NoBlood>/gi, "");
        tempNote = tempNote.replace(/<Bark>/gi, "");
        tempNote = tempNote.replace(/<Spark>/gi, "");
        tempNote = tempNote.replace(/<Rock>/gi, "");
        tempNote = tempNote.replace(/<GreenBlood>/gi, "");
        tempNote = tempNote.replace(/<AzureBlood>/gi, "");
        tempNote = tempNote.replace(/<BlackBlood>/gi, "");
        tempNote = tempNote.replace(/<Archetype:\s*[^>]+>/gi, "");
        tempNote = tempNote.replace(/<Diurnal>/gi, "");
        tempNote = tempNote.replace(/<Nocturnal>/gi, "");
        tempNote = tempNote.replace(/<Crepuscular>/gi, "");
        tempNote = tempNote.trim();

        const parts = [
          enTag,
          itTag,
          biomeTag,
          charTag,
          archetypeTag,
          activityTag,
          weightTag,
          talkTag,
          climbTag,
          bloodTag,
          tempNote,
        ].filter((p) => p !== "");
        enemy.note = parts.join("\n");

        document.getElementById("rawNote").value = enemy.note;

        // Update list item with incomplete status and sprite warning
        const incomplete = isIncomplete(enemy);
        const spriteMatch = enemy.note.match(/<Char:([^>]+)>/);
        const spriteName = spriteMatch ? spriteMatch[1].trim() : null;
        const spriteWarning = getSpriteWarningText(spriteName);
        enemySelect.options[currentEditingIndex].textContent = `${
          incomplete ? "❗ " : ""
        }${spriteWarning}[${enemy.id}] ${enemy.name}`;
      }

      function updateFromRawNote() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];
        const rawNote = document.getElementById("rawNote").value;

        // Update enemy note directly
        enemy.note = rawNote;

        // Parse and update all UI fields from the raw note
        const note = rawNote || "";

        // Parse descriptions
        const enMatch = note.match(/<En:\s*([\s\S]*?)>/);
        const itMatch = note.match(/<It:\s*([\s\S]*?)>/);

        let enText = enMatch ? enMatch[1].trim() : "";
        let itText = itMatch ? itMatch[1].trim() : "";
        enText = enText.replace(/<Char:[^>]+>/gi, "").trim();
        itText = itText.replace(/<Char:[^>]+>/gi, "").trim();

        descEnInput.value = enText;
        descItInput.value = itText;

        // Parse biomes
        const biomeMatch = note.match(/<Biome:\s*([\s\S]*?)>/);
        currentBiomes = [];
        if (biomeMatch) {
          currentBiomes = biomeMatch[1]
            .split(",")
            .map((s) => s.trim())
            .filter((s) => s);
        }
        renderBiomeTags();

        // Parse sprite
        const spriteMatch = note.match(/<Char:([^>]+)>/);
        const spriteName = spriteMatch ? spriteMatch[1].trim() : null;
        updateVisualBox(
          "mainSpriteDiv",
          "spriteNameLabel",
          "imageStatus",
          spriteName,
          spriteLibrary,
          "sprite"
        );

        // Update sprite usage count
        const usageCount = getSpriteUsageCount(spriteName);
        document.getElementById("spriteUsageCount").textContent = spriteName ? `(${usageCount}x)` : "";

        // Parse weight
        const weightMatch = note.match(/<Weight:\s*(\d+)\s*kg>/i);
        weightInput.value = weightMatch ? parseInt(weightMatch[1]) : "";

        // Parse talk checkbox
        talkCheckbox.checked = /<Talk>/i.test(note);

        // Parse climb checkbox
        climbCheckbox.checked = /<Climb>/i.test(note);

        // Parse blood type
        const bloodTypes = [
          "NoBlood",
          "Bark",
          "Spark",
          "Rock",
          "GreenBlood",
          "AzureBlood",
          "BlackBlood",
        ];
        let foundBlood = "";
        for (const bt of bloodTypes) {
          if (new RegExp(`<${bt}>`, "i").test(note)) {
            foundBlood = bt;
            break;
          }
        }
        bloodSelect.value = foundBlood;

        // Parse archetype
        const archetypeMatch = note.match(/<Archetype:\s*([^>]+)>/i);
        archetypeSelect.value = archetypeMatch ? archetypeMatch[1].trim() : "";

        // Parse activity period
        const activityTypes = ["Diurnal", "Nocturnal", "Crepuscular"];
        let foundActivity = "";
        for (const at of activityTypes) {
          if (new RegExp(`<${at}>`, "i").test(note)) {
            foundActivity = at;
            break;
          }
        }
        activitySelect.value = foundActivity;

        // Update unused panel in case sprite changed
        updateUnusedPanel();

        // Update table view
        renderTable();

        // Update list to refresh all warning symbols (sprite may have changed)
        renderList();
      }

      // --- Biomes ---
      function renderBiomeTags() {
        biomeTagsList.innerHTML = "";
        currentBiomes.forEach((biome) => {
          const tag = document.createElement("div");
          tag.className = "biome-tag";
          tag.innerHTML = `${biome} <span class="remove-tag" onclick="removeBiome('${biome}')">&times;</span>`;
          biomeTagsList.appendChild(tag);
        });
      }

      function addBiome() {
        if (currentEditingIndex === -1) return;
        const val = biomeSelect.value;
        if (!currentBiomes.includes(val)) {
          currentBiomes.push(val);
          renderBiomeTags();
          updateEnemyData();
        }
      }

      function removeBiome(biome) {
        currentBiomes = currentBiomes.filter((b) => b !== biome);
        renderBiomeTags();
        updateEnemyData();
      }

      function applyBiomePreset() {
        if (currentEditingIndex === -1) return;
        const presetSelect = document.getElementById("biomePresetSelect");
        const presetName = presetSelect.value;
        if (!presetName || !BIOME_PRESETS[presetName]) return;

        // Replace current biomes with preset biomes
        currentBiomes = [...BIOME_PRESETS[presetName]];
        renderBiomeTags();
        updateEnemyData();

        // Reset preset dropdown
        presetSelect.value = "";
      }

        ALL_BIOMES.forEach(biome => {
          biomeScores[biome] = 0;
        });

        // Check each keyword in the enemy name
        for (const [keyword, biomes] of Object.entries(biomeKeywords)) {
          if (enemyName.includes(keyword)) {
            biomes.forEach(biome => {
              if (ALL_BIOMES.includes(biome)) {
                biomeScores[biome] += 10; // High score for keyword match
              }
            });
          }
        }

        // Add fuzzy matching bonus for direct biome name matches
        ALL_BIOMES.forEach(biome => {
          const biomeLower = biome.toLowerCase();
          if (enemyName.includes(biomeLower)) {
            biomeScores[biome] += 20; // Even higher score for direct match
          }

          // Check if biome is part of a word in the enemy name
          const words = enemyName.split(/[\s\-_]+/);
          words.forEach(word => {
            if (biomeLower.includes(word) && word.length > 3) {
              biomeScores[biome] += 5;
            } else if (word.includes(biomeLower) && biomeLower.length > 3) {
              biomeScores[biome] += 5;
            }
          });
        });

        // Sort biomes by score
        const sortedBiomes = Object.entries(biomeScores)
          .filter(([_, score]) => score > 0)
          .sort((a, b) => b[1] - a[1])
          .map(([biome, _]) => biome);

        // Add top matches (max 5, or fewer if low scores)
        let addedCount = 0;
        const maxBiomesToAdd = 5;

        sortedBiomes.forEach(biome => {
          if (addedCount < maxBiomesToAdd && !currentBiomes.includes(biome)) {
            currentBiomes.push(biome);
            addedCount++;
          }
        });

        // If no matches found, add "Misc" as fallback
        if (addedCount === 0 && !currentBiomes.includes('Misc')) {
          currentBiomes.push('Misc');
        }

        renderBiomeTags();
        updateEnemyData();

        // Show feedback
        if (addedCount > 0) {
          console.log(`Auto-matched ${addedCount} biome(s) for "${enemy.name}":`, sortedBiomes.slice(0, addedCount));
        } else {
          console.log(`No biome matches found for "${enemy.name}", added "Misc"`);
        }
