      // --- MODAL LOGIC ---
      function openModal(index, context) {
        currentEditingIndex = index;
        currentModalContext = context;
        modalSearch.value = "";
        document.getElementById("modalTitle").textContent =
          context === "sprite" ? "Select Sprite" : "Select Battler";

        renderModalGrid();
        mediaModal.style.display = "flex";
        modalSearch.focus();
      }

      function renderModalGrid() {
        modalGrid.innerHTML = "";
        const library =
          currentModalContext === "sprite" ? spriteLibrary : battlerLibrary;
        const names =
          currentModalContext === "sprite"
            ? spriteOriginalNames
            : battlerOriginalNames;

        if (currentModalContext === "sprite") {
          // Group sprites by usage count
          const allKeys = Object.keys(library).sort();
          const spritesByUsage = {
            unused: [],
            used1x: [],
            used2x: [],
            used3to5x: [],
            other: []
          };

          allKeys.forEach((key) => {
            const originalName = names[key];
            const usageCount = getSpriteUsageCount(originalName);

            if (usageCount === 0) {
              spritesByUsage.unused.push({ key, originalName, usageCount });
            } else if (usageCount === 1) {
              spritesByUsage.used1x.push({ key, originalName, usageCount });
            } else if (usageCount === 2) {
              spritesByUsage.used2x.push({ key, originalName, usageCount });
            } else if (usageCount >= 3 && usageCount <= 5) {
              spritesByUsage.used3to5x.push({ key, originalName, usageCount });
            } else {
              spritesByUsage.other.push({ key, originalName, usageCount });
            }
          });

          // Helper function to render a group
          const renderGroup = (sprites, title, color, borderColor) => {
            if (sprites.length === 0) return;

            const header = document.createElement("div");
            header.style.cssText = `grid-column: 1 / -1; padding: 10px; background: #222; color: ${color}; font-weight: bold; text-align: center; border-radius: 4px; margin: 10px 0;`;
            header.textContent = `${title} (${sprites.length})`;
            modalGrid.appendChild(header);

            sprites.forEach(({ key, originalName, usageCount }) => {
              const url = library[key];
              const div = document.createElement("div");
              div.className = "grid-item";
              div.setAttribute("data-name", originalName.toLowerCase());
              if (borderColor) {
                div.style.border = `2px solid ${borderColor}`;
              }

              div.innerHTML = `
                      <div class="sprite-crop animating" style="background-image: url('${url}'); width:50px; height:50px;"></div>
                      <span>${originalName}${usageCount > 0 ? `<br><span style="color:#5dade2; font-size:0.8em;">(${usageCount}x)</span>` : ""}</span>
                  `;
              div.onclick = () => assignImage(originalName);
              modalGrid.appendChild(div);
            });
          };

          // Render groups in order
          renderGroup(spritesByUsage.unused, "UNUSED SPRITES", "#5dade2", "#5dade2");
          renderGroup(spritesByUsage.used1x, "USED 1x", "#27ae60", null);
          renderGroup(spritesByUsage.used2x, "USED 2x", "#f39c12", null);
          renderGroup(spritesByUsage.used3to5x, "USED 3-5x", "#e67e22", null);
          renderGroup(spritesByUsage.other, "ALL OTHER SPRITES (6x+)", "#888", null);
        } else {
          // For battlers, just show all sorted
          Object.keys(library)
            .sort()
            .forEach((key) => {
              const url = library[key];
              const originalName = names[key];

              const div = document.createElement("div");
              div.className = "grid-item";
              div.setAttribute("data-name", originalName.toLowerCase());

              div.innerHTML = `
                      <div class="battler-view" style="background-image: url('${url}'); width:50px; height:50px;"></div>
                      <span>${originalName}</span>
                  `;
              div.onclick = () => assignImage(originalName);
              modalGrid.appendChild(div);
            });
        }
      }

      function assignImage(name) {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];

        if (currentModalContext === "sprite") {
          // Update Note Tag
          const newTag = `<Char:${name}>`;
          let note = enemy.note || "";
          if (/<Char:[^>]+>/.test(note)) {
            note = note.replace(/<Char:[^>]+>/, () => newTag);
          } else {
            note = note + "\n" + newTag;
          }
          enemy.note = note;
          updateUnusedPanel();

          // Update sprite usage count
          const usageCount = getSpriteUsageCount(name);
          document.getElementById("spriteUsageCount").textContent = `(${usageCount}x)`;
        } else {
          // Update Battler Property
          enemy.battlerName = name;
        }

        mediaModal.style.display = "none";
        loadSingleView(currentEditingIndex);
        renderList(); // Update dropdown to refresh warning symbols
        renderTable();
      }

      // --- FILTERING ---
      function filterList(query) {
        const q = query.toLowerCase();
        const options = enemySelect.options;
        for (let i = 0; i < options.length; i++) {
          const index = options[i].value;
          const enemy = enemiesData[index];
          const note = (enemy.note || "").toLowerCase();
          const name = enemy.name.toLowerCase();
          const bName = (enemy.battlerName || "").toLowerCase();
          const matches =
            name.includes(q) ||
            String(enemy.id).includes(q) ||
            note.includes(q) ||
            bName.includes(q);
          options[i].style.display = matches ? "" : "none";
        }
      }

      function filterTable(query) {
        const q = query.toLowerCase();
        const rows = tableBody.querySelectorAll("tr");
        rows.forEach((row) => {
          const searchData = row.getAttribute("data-search");
          row.style.display = searchData.includes(q) ? "" : "none";
        });
      }

      function filterModal(query) {
        const q = query.toLowerCase();
        const items = modalGrid.querySelectorAll(".grid-item");
        items.forEach((item) => {
          const name = item.getAttribute("data-name");
          item.style.display = name.includes(q) ? "flex" : "none";
        });
      }

      // --- PARAMETERS & REWARDS ---
      function calculateLevel(params) {
        // Level = floor((ATK + DEF + MAT + MDF + AGI + LUK) / 12.5)
        const sum = params[2] + params[3] + params[4] + params[5] + params[6] + params[7];
        return Math.floor(sum / 12.5);
      }

      function updateLevel() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];
        const level = calculateLevel(enemy.params || [0,0,0,0,0,0,0,0]);

        // Update display
        document.getElementById("levelDisplay").textContent = `Level: ${level}`;

        // Update note with level tag
        let note = enemy.note || "";
        const levelTag = `<Level: ${level}>`;

        if (/<Level:\s*\d+>/.test(note)) {
          note = note.replace(/<Level:\s*\d+>/, levelTag);
        } else {
          // Add level tag after biome tag if it exists, otherwise add at end
          if (/<Biome:[\s\S]*?>/.test(note)) {
            note = note.replace(/(<Biome:[\s\S]*?>)/, `$1\n${levelTag}`);
          } else {
            note = note.trim() + "\n" + levelTag;
          }
        }

        enemy.note = note;
        document.getElementById("rawNote").value = note;
      }

      function updateParams() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];
        enemy.params = [
          parseInt(document.getElementById("paramHP").value) || 0,
          parseInt(document.getElementById("paramMP").value) || 0,
          parseInt(document.getElementById("paramATK").value) || 0,
          parseInt(document.getElementById("paramDEF").value) || 0,
          parseInt(document.getElementById("paramMAT").value) || 0,
          parseInt(document.getElementById("paramMDF").value) || 0,
          parseInt(document.getElementById("paramAGI").value) || 0,
          parseInt(document.getElementById("paramLUK").value) || 0,
        ];
        updateLevel();
      }

      function updateRewards() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];
        enemy.exp = parseInt(document.getElementById("rewardEXP").value) || 0;
        enemy.gold = parseInt(document.getElementById("rewardGold").value) || 0;
      }

      // --- DROP ITEMS ---
      function renderDropItems() {
        const enemy = enemiesData[currentEditingIndex];
        const dropsList = document.getElementById("dropItemsList");
        dropsList.innerHTML = "";

        const drops = enemy.dropItems || [];
        drops.forEach((drop, index) => {
          const row = document.createElement("div");
          row.className = "drop-item-row";

          // Build item options (material items only)
          let itemOptions = '<option value="">Select Item</option>';
          MATERIAL_ITEMS.forEach(item => {
            const selected = item.id === drop.dataId ? 'selected' : '';
            itemOptions += `<option value="${item.id}" ${selected}>${item.id}: ${item.name}</option>`;
          });

          row.innerHTML = `
            <select onchange="updateDropDataId(${index}, this.value)" style="flex: 2;">
              ${itemOptions}
            </select>
            <input type="number" min="1" placeholder="1/N" value="${drop.denominator || 1}"
                   onchange="updateDropDenominator(${index}, this.value)" style="max-width: 80px;" />
            <button onclick="removeDropItem(${index})">Remove</button>
          `;
          dropsList.appendChild(row);
        });
      }

      function addDropItem() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];
        if (!enemy.dropItems) enemy.dropItems = [];
        // Default to first material item (Steel ingot, ID 565)
        enemy.dropItems.push({ kind: 1, dataId: 565, denominator: 1 });
        renderDropItems();
      }

      function removeDropItem(index) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.dropItems.splice(index, 1);
        renderDropItems();
      }

      function updateDropDataId(index, value) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.dropItems[index].dataId = parseInt(value) || 565;
        // Ensure kind is always 1 (Item)
        enemy.dropItems[index].kind = 1;
      }

      function updateDropDenominator(index, value) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.dropItems[index].denominator = parseInt(value) || 1;
      }

      // --- SKILLS (ACTION PATTERNS) ---
      function getSkillName(skillId) {
        const skill = skillsData.find(s => s.id === skillId);
        return skill ? skill.name : `Skill ${skillId}`;
      }

      function renderSkills() {
        const enemy = enemiesData[currentEditingIndex];
        const skillsList = document.getElementById("skillsList");
        skillsList.innerHTML = "";

        const actions = enemy.actions || [];
        actions.forEach((action, index) => {
          const row = document.createElement("div");
          row.className = "skill-row";

          // Build skill options
          let skillOptions = '<option value="">Select Skill</option>';
          if (skillsData.length > 0) {
            // Sort skills alphabetically by name
            const sortedSkills = [...skillsData].sort((a, b) => a.name.localeCompare(b.name));
            sortedSkills.forEach(skill => {
              const selected = skill.id === action.skillId ? 'selected' : '';
              skillOptions += `<option value="${skill.id}" ${selected}>${skill.id}: ${skill.name}</option>`;
            });
          } else {
            // If skills not loaded, just show current skill ID
            skillOptions += `<option value="${action.skillId}" selected>Skill ${action.skillId}</option>`;
          }

          row.innerHTML = `
            <select onchange="updateSkillId(${index}, this.value)">
              ${skillOptions}
            </select>
            <input type="number" min="1" max="10" placeholder="Rating" value="${action.rating || 5}"
                   onchange="updateSkillRating(${index}, this.value)" title="Rating (1-10)" />
            <button onclick="removeSkill(${index})">Remove</button>
          `;
          skillsList.appendChild(row);
        });
      }

      function addSkill() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];
        if (!enemy.actions) enemy.actions = [];

        // Default to first available skill or skill 1
        const defaultSkillId = skillsData.length > 0 ? skillsData[0].id : 1;

        enemy.actions.push({
          skillId: defaultSkillId,
          conditionType: 0,  // Always
          conditionParam1: 0,
          conditionParam2: 0,
          rating: 5
        });
        renderSkills();
      }

      function removeSkill(index) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.actions.splice(index, 1);
        renderSkills();
      }

      function updateSkillId(index, value) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.actions[index].skillId = parseInt(value) || 1;
      }

      function updateSkillRating(index, value) {
        const enemy = enemiesData[currentEditingIndex];
        const rating = parseInt(value) || 5;
        enemy.actions[index].rating = Math.min(10, Math.max(1, rating));
      }

      // --- TRAITS ---
      function renderTraits() {
        const enemy = enemiesData[currentEditingIndex];
        const traitsList = document.getElementById("traitsList");
        traitsList.innerHTML = "";

        const traits = enemy.traits || [];
        traits.forEach((trait, index) => {
          const row = document.createElement("div");
          row.className = "trait-row";

          // Build trait type options
          let traitTypeOptions = '<option value="">Select Trait Type</option>';
          TRAIT_TYPES.forEach(t => {
            const selected = t.code === trait.code ? 'selected' : '';
            traitTypeOptions += `<option value="${t.code}" ${selected}>${t.name}</option>`;
          });

          // Build dataId options based on trait type
          const traitType = TRAIT_TYPES.find(t => t.code === trait.code);
          let dataIdOptions = '<option value="0">-</option>';

          if (traitType && traitType.hasDataId) {
            if (trait.code === 22) { // Ex-Parameter
              EX_PARAMS.forEach(p => {
                const selected = p.id === trait.dataId ? 'selected' : '';
                dataIdOptions += `<option value="${p.id}" ${selected}>${p.name}</option>`;
              });
            } else if (trait.code === 21) { // Regular Parameter
              REGULAR_PARAMS.forEach(p => {
                const selected = p.id === trait.dataId ? 'selected' : '';
                dataIdOptions += `<option value="${p.id}" ${selected}>${p.name}</option>`;
              });
            } else if (trait.code === 11 || trait.code === 31) { // Element Rate or Attack Element
              ELEMENTS.forEach(e => {
                const selected = e.id === trait.dataId ? 'selected' : '';
                dataIdOptions += `<option value="${e.id}" ${selected}>${e.name}</option>`;
              });
            }
          }

          // Value input based on trait type
          let valueInput = '';
          if (traitType) {
            if (traitType.valueType === 'percent') {
              valueInput = `<input type="number" min="0" max="1000" step="1" placeholder="%" value="${Math.round(trait.value * 100)}"
                onchange="updateTraitValue(${index}, this.value, 'percent')" title="Percentage (0-1000%)" />`;
            } else if (traitType.valueType === 'decimal') {
              valueInput = `<input type="number" min="-100" max="100" step="0.01" placeholder="Value" value="${trait.value}"
                onchange="updateTraitValue(${index}, this.value, 'decimal')" title="Decimal value" />`;
            } else if (traitType.valueType === 'number') {
              valueInput = `<input type="number" min="-999" max="999" step="1" placeholder="Value" value="${trait.value}"
                onchange="updateTraitValue(${index}, this.value, 'number')" title="Number value" />`;
            } else {
              valueInput = `<span style="color: #888; font-size: 0.9em;">No value needed</span>`;
            }
          }

          row.innerHTML = `
            <select onchange="updateTraitCode(${index}, this.value)" style="flex: 1.5;">
              ${traitTypeOptions}
            </select>
            <select onchange="updateTraitDataId(${index}, this.value)" style="flex: 1.5;">
              ${dataIdOptions}
            </select>
            ${valueInput}
            <button onclick="removeTrait(${index})">Remove</button>
          `;
          traitsList.appendChild(row);
        });
      }

      function addTrait() {
        if (currentEditingIndex === -1) return;
        const enemy = enemiesData[currentEditingIndex];
        if (!enemy.traits) enemy.traits = [];

        enemy.traits.push({
          code: 22,
          dataId: 0,
          value: 1.0
        });
        renderTraits();
      }

      function removeTrait(index) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.traits.splice(index, 1);
        renderTraits();
      }

      function updateTraitCode(index, value) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.traits[index].code = parseInt(value) || 22;
        enemy.traits[index].dataId = 0;
        enemy.traits[index].value = 1.0;
        renderTraits();
      }

      function updateTraitDataId(index, value) {
        const enemy = enemiesData[currentEditingIndex];
        enemy.traits[index].dataId = parseInt(value) || 0;
      }

      function updateTraitValue(index, value, type) {
        const enemy = enemiesData[currentEditingIndex];
        if (type === 'percent') {
          enemy.traits[index].value = parseFloat(value) / 100 || 1.0;
        } else if (type === 'decimal' || type === 'number') {
          enemy.traits[index].value = parseFloat(value) || 0;
        }
      }

      // --- UNUSED PANEL (SPRITES ONLY FOR NOW) ---
      function updateUnusedPanel() {
        const usedKeys = new Set();
        enemiesData.forEach((enemy) => {
          const note = enemy.note || "";
          const match = note.match(/<Char:([^>]+)>/);
          if (match) {
            const tagContent = match[1].trim();
            const actualKey = resolveKey(spriteLibrary, tagContent);
            if (actualKey) usedKeys.add(actualKey);
          }
        });

        const allKeys = Object.keys(spriteLibrary);
        const unusedKeys = allKeys.filter((key) => !usedKeys.has(key)).sort();

        unusedList.innerHTML = "";
        unusedCount.textContent = unusedKeys.length;

        if (allKeys.length === 0) {
          unusedList.innerHTML =
            '<div style="color: #666; font-style: italic; font-size: 0.9em; text-align: center; width: 100%;">No sprites loaded.</div>';
          return;
        }

        unusedKeys.forEach((key) => {
          const url = spriteLibrary[key];
          const originalName = spriteOriginalNames[key];
          const div = document.createElement("div");
          div.className = "unused-item";
          div.title = "Click to copy name";
          div.innerHTML = `
                    <div class="sprite-crop" style="background-image: url('${url}'); transform: scale(0.8);"></div>
                    <span>${originalName}</span>
                `;
          div.onclick = () => {
            navigator.clipboard.writeText(originalName);
            div.style.backgroundColor = "#5dade2";
            setTimeout(() => (div.style.backgroundColor = "#333"), 200);
          };
          unusedList.appendChild(div);
        });
      }

      function saveFile() {
        const output = [null, ...enemiesData];
        const jsonStr = JSON.stringify(output, null, 2);
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "enemies.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    </script>
  </body>
</html>
